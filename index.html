<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA POS V3</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.9); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; }
        body { -webkit-tap-highlight-color: transparent; background-color: #000; color: white; }
    </style>
</head>
<body>

    <header class="bg-red-800 p-4 sticky top-0 border-b-2 border-yellow-500 shadow-2xl z-50">
        <div class="flex justify-between items-center mb-2">
            <h1 class="font-black italic text-yellow-400 text-xl uppercase">NIZA POS</h1>
            <div class="flex gap-2">
                <button onclick="document.getElementById('m-admin').style.display='flex'; actAdmin();" class="bg-yellow-500 text-black px-4 py-1 rounded-lg font-black text-[10px]">ADMIN</button>
                <button onclick="verRepo()" class="bg-white/10 px-4 py-1 rounded-lg font-black text-[10px]">CIERRE</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-[8px] text-center font-bold uppercase">
            <div class="bg-black/40 p-1 rounded">Base<br><span id="v-base" class="text-blue-300 font-mono text-[10px]">$ 0</span></div>
            <div class="bg-black/40 p-1 rounded">Ventas<br><span id="v-ventas" class="text-green-400 font-mono text-[10px]">$ 0</span></div>
            <div class="bg-black/40 p-1 rounded">Gastos<br><span id="v-gastos" class="text-red-400 font-mono text-[10px]">$ 0</span></div>
            <div class="bg-orange-500/20 p-1 rounded border border-orange-500 text-yellow-300 font-black">Caja<br>$ <span id="v-total" class="text-[10px]">0</span></div>
        </div>
    </header>

    <main id="menu" class="p-4 grid grid-cols-2 gap-4"></main>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full text-center border-2 border-zinc-700 shadow-2xl">
            <h2 id="opt-titulo" class="text-yellow-400 font-black mb-8 uppercase text-2xl italic">¿CÓMO VA?</h2>
            <div class="flex flex-col gap-5">
                <button onclick="sumarConOpcion('papa')" class="bg-slate-700 py-8 rounded-3xl text-2xl font-black tap border-b-4 border-slate-900 uppercase">🥔 Con Papa</button>
                <button onclick="sumarConOpcion('patacon')" class="bg-orange-700 py-8 rounded-3xl text-2xl font-black tap border-b-4 border-orange-900 text-orange-100 uppercase">🍌 Con Patacón</button>
            </div>
            <button onclick="cerrarOpciones()" class="mt-8 text-zinc-500 font-bold uppercase p-4">Regresar</button>
        </div>
    </div>

    <div id="m-domi" class="modal px-6"><div class="bg-zinc-900 p-6 rounded-3xl w-full text-center border border-zinc-700">
        <h2 class="text-blue-400 font-black mb-4 uppercase">Valor Domicilio</h2>
        <input type="number" id="domi-v" placeholder="$ 0" class="w-full bg-zinc-800 p-5 rounded-2xl mb-6 text-white text-center text-4xl font-mono outline-none border-2 border-blue-900">
        <button onclick="addDomi()" class="w-full bg-blue-600 py-5 rounded-2xl font-black tap mb-2 uppercase">SUMAR 🛵</button>
        <button onclick="document.getElementById('m-domi').style.display='none'" class="text-zinc-500 font-bold py-2 uppercase text-xs">Cerrar</button>
    </div></div>

    <div id="m-gasto" class="modal px-6"><div class="bg-zinc-900 p-6 rounded-3xl w-full text-center border border-zinc-700">
        <h2 class="text-red-500 font-black mb-4 uppercase">Nuevo Gasto</h2>
        <input type="number" id="g-v" placeholder="$ 0" class="w-full bg-zinc-800 p-5 rounded-2xl mb-2 text-white text-center text-3xl font-mono outline-none border-2 border-red-900">
        <input type="text" id="g-d" placeholder="¿En qué?" class="w-full bg-zinc-800 p-5 rounded-2xl mb-6 text-white text-center uppercase font-black outline-none">
        <button onclick="saveGasto()" class="w-full bg-red-600 py-5 rounded-2xl font-black tap mb-2 uppercase">GUARDAR 💸</button>
        <button onclick="document.getElementById('m-gasto').style.display='none'" class="text-zinc-500 font-bold py-2 uppercase text-xs">Cerrar</button>
    </div></div>

    <div id="m-admin" class="modal px-4"><div class="bg-zinc-900 p-6 rounded-[30px] w-full max-h-[85vh] flex flex-col border border-zinc-700">
        <h2 class="text-yellow-500 font-black text-center mb-4 uppercase">INVENTARIO</h2>
        <input type="number" id="a-base" class="w-full bg-zinc-800 p-4 rounded-xl mb-4 text-center text-2xl font-mono text-white outline-none">
        <div id="a-items" class="overflow-y-auto flex-1 mb-4 space-y-2"></div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('m-admin').style.display='none'" class="flex-1 bg-zinc-800 py-5 rounded-2xl text-xs font-black uppercase">Salir</button>
            <button onclick="saveAdmin()" class="flex-1 bg-green-600 py-5 rounded-2xl text-xs font-black uppercase">Guardar ✅</button>
        </div>
    </div></div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white p-6 flex justify-between items-center z-50 rounded-t-[50px] shadow-[0_-10px_50px_rgba(0,0,0,0.8)]">
        <div class="pl-2">
            <span class="text-zinc-400 text-[10px] block uppercase font-black italic mb-1">Total Pedido</span>
            <span id="t-ped" class="text-5xl font-black text-black font-mono italic tracking-tighter leading-none">$ 0</span>
        </div>
        <div class="flex gap-3">
            <button onclick="document.getElementById('m-domi').style.display='flex'" class="bg-blue-50 text-blue-600 w-14 h-18 rounded-2xl text-3xl tap flex items-center justify-center border border-blue-200 shadow-sm">🛵</button>
            <button onclick="document.getElementById('m-gasto').style.display='flex'" class="bg-red-50 text-red-600 w-14 h-18 rounded-2xl text-3xl tap flex items-center justify-center border border-red-200 shadow-sm">💸</button>
            <button onclick="doCobro()" class="bg-green-600 text-white w-24 h-22 rounded-[35px] text-5xl tap shadow-xl flex items-center justify-center font-black">💰</button>
        </div>
    </footer>

    <script>
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null; let pedido = 0; let tempProd = null;

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        // NODO NUEVO "V3" PARA EVITAR EL CACHÉ
        db.ref('/v3').on('value', (s) => {
            store = s.val();
            if(!store) {
                const menu = [
                    { id: 1, nombre: "Empanada", precio: 4000, cant: 50, icon: "🥟", opt: false },
                    { id: 2, nombre: "Rellena", precio: 7000, cant: 20, icon: "🍖", opt: true },
                    { id: 3, nombre: "Pincho", precio: 8000, cant: 20, icon: "🍢", opt: true },
                    { id: 4, nombre: "Fresas Crema", precio: 14000, cant: 15, icon: "🍓", opt: false },
                    { id: 5, nombre: "Limonada", precio: 1000, cant: 25, icon: "🥤", opt: false }
                ];
                db.ref('/v3').set({ base: 0, ventas: 0, gastos: 0, stock: menu, h: [] });
            } else { draw(); }
        });

        function draw() {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                m.innerHTML += `<div onclick="intentarSumar(${p.id})" class="bg-zinc-900 p-5 rounded-[35px] border border-white/5 shadow-2xl tap text-center">
                    <div class="text-5xl mb-2">${p.icon}</div>
                    <div class="text-[10px] font-black uppercase text-white/50 mb-1 leading-none h-4">${p.nombre}</div>
                    <div class="text-orange-400 font-black text-sm font-mono">$ ${f(p.precio)}</div>
                    <div class="text-[8px] text-green-500 uppercase mt-2 font-bold">Stock: ${p.cant}</div>
                </div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function intentarSumar(id) {
            let p = store.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("SIN STOCK");
            if(p.opt) {
                tempProd = p;
                document.getElementById('opt-titulo').innerText = p.nombre;
                document.getElementById('m-opciones').style.display = 'flex';
            } else { sumarDirecto(p, p.precio); }
        }

        function sumarConOpcion(tipo) {
            let pFinal = tempProd.precio;
            if(tipo === 'patacon') pFinal += 1000;
            sumarDirecto(tempProd, pFinal);
            cerrarOpciones();
        }

        function sumarDirecto(p, precio) {
            pedido += precio; p.cant--;
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function cerrarOpciones() { document.getElementById('m-opciones').style.display = 'none'; tempProd = null; }

        function addDomi() {
            pedido += parseInt(document.getElementById('domi-v').value) || 0;
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
            document.getElementById('m-domi').style.display='none';
            document.getElementById('domi-v').value = '';
        }

        function doCobro() {
            if(pedido === 0) return;
            db.ref('/v3').update({ ventas: store.ventas + pedido, stock: store.stock }).then(() => {
                pedido = 0; document.getElementById('t-ped').innerText = "$ 0";
                alert("COBRADO ✅");
            });
        }

        function saveGasto() {
            const v = parseInt(document.getElementById('g-v').value);
            if(!v) return;
            const h = store.h || []; h.push({ v, d: document.getElementById('g-d').value || 'Gasto', t: new Date().toLocaleTimeString() });
            db.ref('/v3').update({ gastos: (store.gastos || 0) + v, h: h }).then(() => {
                document.getElementById('m-gasto').style.display='none';
                document.getElementById('g-v').value=''; document.getElementById('g-d').value='';
            });
        }

        function actAdmin() {
            const c = document.getElementById('a-items'); document.getElementById('a-base').value = store.base;
            c.innerHTML = '';
            store.stock.forEach((p, i) => {
                c.innerHTML += `<div class="bg-black/50 p-4 rounded-2xl border border-white/5 mb-2">
                    <div class="flex justify-between mb-2">
                         <input type="text" id="n-${i}" value="${p.nombre}" class="bg-transparent text-yellow-400 font-black uppercase text-xs">
                         <label class="text-[8px]">OPT? <input type="checkbox" id="o-${i}" ${p.opt?'checked':''}></label>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="p-${i}" value="${p.precio}" class="w-1/2 bg-zinc-800 p-2 rounded-xl text-xs text-orange-400 text-center font-mono">
                        <input type="number" id="ac-${i}" value="${p.cant}" class="w-1/2 bg-zinc-800 p-2 rounded-xl text-xs text-green-400 text-center font-mono">
                    </div>
                </div>`;
            });
        }

        function saveAdmin() {
            const ns = store.stock.map((p, i) => ({
                ...p, nombre: document.getElementById(`n-${i}`).value,
                opt: document.getElementById(`o-${i}`).checked,
                precio: parseInt(document.getElementById(`p-${i}`).value) || 0,
                cant: parseInt(document.getElementById(`ac-${i}`).value) || 0
            }));
            db.ref('/v3').update({ base: parseInt(document.getElementById('a-base').value) || 0, stock: ns }).then(() => {
                document.getElementById('m-admin').style.display='none';
            });
        }

        function verRepo() {
            let l = `REPORTE:\nTotal: $ ${f(store.base + store.ventas - store.gastos)}\n\nGASTOS:\n`;
            if(store.h) store.h.forEach(g => l += `- ${g.d}: $ ${f(g.v)}\n`);
            alert(l);
            if(confirm("¿CERRAR DÍA?")) db.ref('/v3').update({ ventas: 0, gastos: 0, h: [] });
        }
    </script>
</body>
</html>
