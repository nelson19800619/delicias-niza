<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza - POS Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal.active { display: flex; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-48">

    <header class="bg-gradient-to-b from-red-700 to-red-900 p-6 rounded-b-[45px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/40">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black italic text-yellow-400">DELICIAS NIZA</h1>
                <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest">Sincronizado Cloud</p>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg tap-active">ADMIN ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">Cierre 📊</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Base</span><span id="txt-base" class="text-[10px] font-bold text-blue-300">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Ventas</span><span id="txt-ventas" class="text-[10px] font-bold text-green-400">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Gastos</span><span id="txt-gastos" class="text-[10px] font-bold text-red-400">$0</span></div>
            <div class="bg-orange-500/40 p-2 rounded-2xl border border-orange-400/30"><span class="text-[7px] block opacity-50 uppercase">Caja</span><span id="txt-total" class="text-[10px] font-black text-yellow-300">$0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-5 rounded-[30px] mb-6 border-2 border-slate-800 transition-all tap-active">
            <div class="flex items-center gap-4">
                <div id="icon-domi" class="text-3xl grayscale opacity-40 transition-all">🛵</div>
                <div>
                    <p class="font-black text-xs uppercase tracking-tighter">¿ES DOMICILIO?</p>
                    <p class="text-[10px] opacity-50">Aumenta $2.000 al total</p>
                </div>
            </div>
            <div id="check-ui" class="w-8 h-8 rounded-full border-4 border-slate-700 transition-all"></div>
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid">
            </div>

        <div class="mt-8">
            <h3 class="text-[10px] font-black uppercase text-slate-500 mb-3 ml-2 italic tracking-widest">Últimas Acciones</h3>
            <div id="historial-lista" class="space-y-1 bg-slate-900/40 p-3 rounded-3xl min-h-[100px]"></div>
        </div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-70
