<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niza POS - Cobro Reparado</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap-active:active { transform: scale(0.9); opacity: 0.6; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-44">

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-5 rounded-b-[40px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-lg font-black italic text-yellow-400 uppercase">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="document.getElementById('modal-admin').style.display='flex'; abrirAdmin();" class="bg-yellow-500 text-black px-3 py-2 rounded-xl text-[10px] font-black uppercase tap-active">Admin ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">Cierre 📊</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-center font-mono">
            <div class="bg-black/30 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Base</span><span id="txt-base" class="text-[9px] text-blue-300 font-bold">$ 0</span></div>
            <div class="bg-black/30 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Ventas</span><span id="txt-ventas" class="text-[9px] text-green-400 font-bold">$ 0</span></div>
            <div class="bg-black/30 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Gastos</span><span id="txt-gastos" class="text-[9px] text-red-400 font-bold">$ 0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30"><span id="txt-total" class="text-[10px] font-black text-yellow-300">$ 0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div class="grid grid-cols-2 gap-3" id="menu-grid">
            </div>
    </main>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[30px] p-6 text-center">
            <h2 class="text-xl font-black mb-4 text-red-500 uppercase italic">Nuevo Gasto</h2>
            <input type="number" id="g-val" placeholder="$ Cuánto" class="w-full bg-slate-800 p-4 rounded-xl mb-3 text-white text-2xl font-mono text-center outline-none">
            <input type="text" id="g-desc" placeholder="¿En qué?" class="w-full bg-slate-800 p-4 rounded-xl mb-6 text-white text-sm text-center outline-none uppercase font-bold">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase tap-active mb-3">Registrar Gasto 💸</button>
            <button onclick="cerrarTodo()" class="w-full text-slate-500 text-[10px] font-black uppercase">Cerrar</button>
        </div>
    </div>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[30px] p-6 max-h-[80vh] flex flex-col">
            <h2 class="text-center font-black text-yellow-500 mb-4 uppercase">Configuración</h2>
            <input type="number" id="adm-base" placeholder="Base $" class="w-full bg-slate-800 p-3 rounded-xl text-white text-center mb-4 border border-slate-700 font-mono">
            <div id="admin-items" class="overflow-y-auto space-y-2 flex-1 pr-1"></div>
            <div class="mt-4 flex gap-2">
                <button onclick="cerrarTodo()" class="flex-1 bg-slate-800 py-3 rounded-xl font-black text-[10px] text-slate-400">SALIR</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-3 rounded-xl font-black text-[10px]">GUARDAR ✅</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[35px] p-5 flex justify-between items-center shadow-2xl z-50 border-t-4 border-green-500">
        <div class="flex flex-col">
            <span class="text-[8px] font-black text-slate-400 italic">TOTAL VENTA</span>
            <span id="total-ticket" class="text-4xl font-black text-slate-900 italic font-mono">$ 0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-gasto').style.display='flex'" class="bg-red-100 text-red-600 h-14 w-14 rounded-2xl flex items-center justify-center text-2xl tap-active">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-600 text-white h-16 w-28 rounded-[25px] flex items-center justify-center text-4xl shadow-xl tap-active font-bold">💰</button>
        </div>
    </footer>

    <script>
        const config = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let appData = null; let subtotal = 0;

        const formatP = (n) => "$ " + new Intl.NumberFormat('de-DE').format(n || 0);

        db.ref('/').on('value', (s) => {
            appData = s.val();
            if (!appData || !appData.stock) {
                db.ref('/').set({ base: 0, ventas: 0, gastos: 0, stock: [
                    { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 10, icon: "🥟" },
                    { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 10, icon: "🧀" },
                    { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 10, icon: "🌽" },
                    { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 10, icon: "🍍" },
                    { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 10, icon: "🍖" },
                    { id: 6, nombre: "Pinchos", precio: 8000, cant: 10, icon: "🍢" },
                    { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 10, icon: "🍓" },
                    { id: 8, nombre: "Limonada", precio: 1000, cant: 10, icon: "🥤" }
                ], hGastos: [] });
            } else { render(); }
        });

        function render() {
            const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
            appData.stock.forEach(p => {
                grid.innerHTML += `<div onclick="sumar(${p.id})" class="bg-slate-900 border border-white/5 p-4 rounded-[25px] tap-active shadow-lg">
                    <div class="text-3xl mb-1">${p.icon}</div>
                    <h3 class="text-[9px] font-black uppercase opacity-60 mb-1 leading-none">${p.nombre}</h3>
                    <p class="text-orange-400 font-mono font-bold text-xs">${formatP(p.precio)}</p>
                    <span class="text-[7px] font-bold opacity-30 uppercase tracking-tighter">Disp: ${p.cant}</span>
                </div>`;
            });
            document.getElementById('txt-base').innerText = formatP(appData.base);
            document.getElementById('txt-ventas').innerText = formatP(appData.ventas);
            document.getElementById('txt-gastos').innerText = formatP(appData.gastos);
            document.getElementById('txt-total').innerText = formatP(appData.base + appData.ventas - appData.gastos);
        }

        function sumar(id) {
            let p = appData.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("¡AGOTADO!");
            subtotal += p.precio;
            p.cant--;
            document.getElementById('total-ticket').innerText = formatP(subtotal);
        }

        function finalizarVenta() {
            if(subtotal === 0) return alert("Agrega productos primero");
            db.ref('/').update({ 
                ventas: appData.ventas + subtotal, 
                stock: appData.stock 
            }).then(() => {
                subtotal = 0;
                document.getElementById('total-ticket').innerText = formatP(0);
                alert("COBRADO ✅");
            });
        }

        function guardarGasto() {
            const v = parseInt(document.getElementById('g-val').value);
            const d = document.getElementById('g-desc').value || "Gasto";
            if(!v) return;
            const lista = appData.hGastos || [];
            lista.push({ v, d, h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            db.ref('/').update({ 
                gastos: (appData.gastos || 0) + v, 
                hGastos: lista 
            }).then(() => { 
                cerrarTodo(); 
                document.getElementById('g-val').value=''; 
                document.getElementById('g-desc').value=''; 
            });
        }

        function abrirAdmin() {
            const cont = document.getElementById('admin-items');
            document.getElementById('adm-base').value = appData.base;
            cont.innerHTML = '';
            appData.stock.forEach((p, i) => {
                cont.innerHTML += `<div class="bg-slate-800/50 p-3 rounded-xl border border-white/5 mb-2">
                    <input type="text" id="an-${i}" value="${p.nombre}" class="bg-transparent text-yellow-4
