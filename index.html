<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

<body class="bg-slate-950 text-white font-sans pb-40">

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-6 rounded-b-[40px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic text-yellow-400 uppercase tracking-tighter">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="document.getElementById('modal-admin').style.display='flex'; abrirAdmin();" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase tap-active">Admin ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">Cierre 📊</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Base</span><span id="txt-base" class="text-[10px] text-blue-300 font-bold">$ 0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Ventas</span><span id="txt-ventas" class="text-[10px] text-green-400 font-bold">$ 0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Gastos</span><span id="txt-gastos" class="text-[10px] text-red-400 font-bold">$ 0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30"><span id="txt-total" class="text-[10px] font-black text-yellow-300">$ 0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div class="grid grid-cols-2 gap-3" id="menu-grid">
            <p class="col-span-2 text-center py-20 opacity-50 italic">Cargando productos...</p>
        </div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[30px] p-6 max-h-[85vh] flex flex-col">
            <h2 class="text-center font-black text-yellow-500 mb-4 italic uppercase">Configuración</h2>
            <div class="bg-blue-900/10 p-4 rounded-xl border border-blue-500/20 mb-4">
                <p class="text-[10px] text-blue-300 uppercase mb-1 text-center font-bold">Base de Caja ($)</p>
                <input type="number" id="adm-base" class="w-full bg-slate-800 p-2 rounded-lg text-white font-mono text-center outline-none border border-slate-700">
            </div>
            <div id="admin-items" class="overflow-y-auto space-y-2 pr-1 flex-1"></div>
            <div class="mt-6 flex gap-2">
                <button onclick="cerrarTodo()" class="flex-1 bg-slate-800 py-4 rounded-xl font-black text-[10px] uppercase text-slate-400">SALIR</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">GUARDAR ✅</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[30px] p-8 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-red-500 uppercase italic text-center">Registrar Gasto</h2>
            <input type="number" id="g-val" placeholder="$ Valor" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white text-3xl font-mono text-center outline-none border border-red-900">
            <input type="text" id="g-desc" placeholder="¿En qué se gastó?" class="w-full bg-slate-800 p-4 rounded-xl mb-8 text-white text-sm text-center outline-none border border-slate-700 uppercase font-bold">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-sm shadow-xl tap-active mb-3">GUARDAR GASTO 💸</button>
            <button onclick="cerrarTodo()" class="w-full text-slate-500 text-[10px] font-black uppercase tap-active">CANCELAR</button>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[40px] p-6 flex justify-between items-center shadow-2xl z-50 border-t-4 border-green-500">
        <div><span class="text-[8px] font-black text-slate-400 block italic">TOTAL VENTA</span><span id="total-ticket" class="text-4xl font-black text-slate-900 italic font-mono">$ 0</span></div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-gasto').style.display='flex'" class="bg-red-50 text-red-600 h-16 w-14 rounded-2xl flex items-center justify-center text-2xl tap-active">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-600 text-white h-16 w-24 rounded-3xl flex items-center justify-center text-4xl shadow-xl tap-active">💰</button>
        </div>
    </footer>
