<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niza POS - Manual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal.active { display: flex; }
        /* Quita las flechas de los campos de numero */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-40">

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-6 rounded-b-[40px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic text-yellow-400">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase tap-active">Admin ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">Cierre 📊</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">BASE</span><span id="txt-base" class="text-[10px] text-blue-300">$0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">VENTAS</span><span id="txt-ventas" class="text-[10px] text-green-400">$0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">GASTOS</span><span id="txt-gastos" class="text-[10px] text-red-400">$0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30"><span class="text-[7px] block opacity-50">CAJA</span><span id="txt-total" class="text-[10px] font-black text-yellow-300">$0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-5 rounded-[30px] mb-6 border-2 border-slate-800 tap-active">
            <div class="flex items-center gap-4">
                <div id="icon-domi" class="text-3xl grayscale opacity-40">🛵</div>
                <p class="font-black text-xs uppercase italic">¿DOMICILIO? (+$2.000)</p>
            </div>
            <div id="check-ui" class="w-8 h-8 rounded-full border-4 border-slate-700"></div>
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[35px] p-6 max-h-[85vh] flex flex-col">
            <h2 class="text-xl font-black mb-4 text-center text-yellow-500 uppercase italic">Ajustes del Negocio</h2>
            
            <div class="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 mb-4 text-center">
                <p class="text-[9px] font-black text-blue-300 uppercase mb-2 italic">Dinero Base Hoy</p>
                <input type="number" id="adm-base" class="w-full bg-slate-800 p-3 rounded-xl text-white font-mono text-xl text-center outline-none border border-slate-700">
            </div>

            <div id="admin-items" class="overflow-y-auto space-y-3 pr-1 flex-1"></div>

            <div class="mt-6 flex gap-2">
                <button onclick="cerrar()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-[10px] uppercase text-slate-400">Cerrar</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-green-900/30">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[35px] p-8 text-center">
            <h2 class="text-xl font-black mb-6 text-red-500 uppercase italic">Gasto Manual 💸</h2>
            <p class="text-[10px] font-black opacity-50 uppercase mb-2">Valor del gasto</p>
            <input type="number" id="m-gasto" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white text-2xl font-mono text-center outline-none border border-slate-700">
            <p class="text-[10px] font-black opacity-50 uppercase mb-2">¿Para qué fue?</p>
            <input type="text" id="n-gasto" placeholder="Ej: Aceite" class="w-full bg-slate-800 p-4 rounded-xl mb-8 text-white text-sm outline-none border border-slate-700 text-center">
