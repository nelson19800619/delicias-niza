<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA POS V10</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; }
        body { background-color: #000; color: white; user-select: none; overflow-x: hidden; font-family: sans-serif; }
        main { padding-bottom: 110px; }
    </style>
</head>
<body>

    <header class="bg-red-700 p-3 sticky top-0 shadow-2xl z-50 border-b-2 border-yellow-500">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic text-white text-lg leading-none">NIZA POS V10</h1>
            <div class="flex gap-2">
                <button onclick="accesoAdmin()" class="bg-black/40 p-2 rounded-lg text-xs">⚙️</button>
                <button onclick="verRepo()" class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-black text-[9px]">CIERRE</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-[7px] text-center font-bold">
            <div class="bg-black/50 p-1 rounded text-green-400">VENTAS<br><span id="v-ventas">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded text-red-400">GASTOS<br><span id="v-gastos">$ 0</span></div>
            <div class="bg-orange-600 p-1 rounded text-white font-black">CAJA<br><span id="v-total">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded text-blue-300">BASE<br><span id="v-base">$ 0</span></div>
        </div>
    </header>

    <main id="menu" class="p-4 grid grid-cols-2 gap-4">
        <p class="col-span-2 text-center text-zinc-500">Selecciona usuario para cargar...</p>
    </main>

    <div id="m-user" class="modal" style="display: flex;">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-sm border-2 border-yellow-500 text-center">
            <h2 class="text-white font-black mb-6 uppercase">IDENTIFICACIÓN</h2>
            <button onclick="setUsuario('Nelson')" class="w-full bg-orange-600 py-5 rounded-2xl text-xl font-black mb-4 uppercase">Nelson</button>
            <button onclick="setUsuario('Empleado')" class="w-full bg-zinc-700 py-5 rounded-2xl text-xl font-black uppercase text-zinc-300">Empleado</button>
        </div>
    </div>

    <div id="m-admin" class="modal px-4"><div class="bg-zinc-900 p-5 rounded-[30px] w-full max-w-md max-h-[85vh] flex flex-col border border-zinc-700">
        <h2 class="text-yellow-500 font-black text-center mb-4 uppercase">ADMINISTRACIÓN</h2>
        <div class="mb-3">
            <label class="text-[10px] text-zinc-500 uppercase font-black">Base de Caja ($)</label>
            <input type="number" id="a-base" class="w-full bg-zinc-800 p-2 rounded-lg text-lg text-white text-center">
        </div>
        <div id="a-items" class="overflow-y-auto flex-1 space-y-3 mb-4 pr-1"></div>
        <button onclick="saveAdmin()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase mb-2">Guardar Todo ✅</button>
        <button onclick="document.getElementById('m-admin').style.display='none'" class="w-full text-zinc-500 font-bold text-xs uppercase">Cerrar</button>
    </div></div>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-[40px] w-full max-w-sm border-2 border-orange-500 text-center">
            <h2 id="opt-titulo" class="text-yellow-400 font-black mb-6 uppercase text-xl italic">Opción</h2>
            <div id="opt-container" class="flex flex-col gap-3"></div>
            <button onclick="cerrarOpciones()" class="mt-6 text-zinc-500 font-bold uppercase text-xs">← Volver</button>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white p-3 flex justify-between items-center z-50 rounded-t-[35px] shadow-2xl h-[90px]">
        <div class="pl-2">
            <span class="text-zinc-400 text-[8px] block uppercase font-black mb-1">Total Pedido:</span>
            <span id="t-ped" class="text-4xl font-black text-black font-mono italic leading-none">$ 0</span>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="addDomi()" class="bg-blue-100 text-blue-600 w-10 h-12 rounded-xl text-xl tap flex items-center justify-center font-bold">🛵</button>
            <button onclick="abrirGasto()" class="bg-red-100 text-red-600 w-10 h-12 rounded-xl text-xl tap flex items-center justify-center font-bold">💸</button>
            <button onclick="doCobro()" class="bg-green-600 text-white w-20 h-16 rounded-2xl text-4xl tap flex items-center justify-center font-black italic">💰</button>
        </div>
    </footer>

    <script>
        const CLAVE = "1234";
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedido = 0, tempProd = null, listaPedido = [], usuarioActual = "---";

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        function setUsuario(n) { 
            usuarioActual = n; 
            document.getElementById('m-user').style.display='none'; 
            cargarBase();
        }

        function cargarBase() {
            db.ref('/v10').on('value', (s) => {
                store = s.val();
                if(!store) {
                    const init = [
                        { id: 1, nombre: "Empanada", precio: 4000, cant: 50, icon: "🥟", sub: ["Carne", "Pollo", "Queso"] },
                        { id: 2, nombre: "Rellena", precio: 7000, cant: 20, icon: "🍖", sub: ["Con Papa", "Con Patacón"] },
                        { id: 3, nombre: "Pincho", precio: 8000, cant: 20, icon: "🍢", sub: ["Con Papa", "Con Patacón"] },
                        { id: 4, nombre: "Fresas", precio: 14000, cant: 15, icon: "🍓" },
                        { id: 5, nombre: "Bebida", precio: 2000, cant: 30, icon: "🥤" }
                    ];
                    db.ref('/v10').set({ base: 0, ventas: 0, gastos: 0, stock: init, h_ventas: [], h_gastos: [] });
                } else { draw(); }
            });
        }

        function draw() {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                m.innerHTML += `<div onclick="abrirOpciones(${p.id})" class="bg-zinc-900 p-4 rounded-3xl tap text-center shadow-lg border border-white/5">
                    <div class="text-4xl mb-1">${p.icon}</div>
                    <div class="text-[9px] font-black uppercase text-zinc-400 mb-1 leading-none">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-sm font-mono">$ ${f(p.precio)}</div>
                    <div class="text-[7px] text-green-500 font-bold uppercase italic mt-1">Disp: ${p.cant}</div>
                </div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function abrirOpciones(id) {
            let p = store.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("SIN STOCK");
            if(p.sub) {
                tempProd = p;
                document.getElementById('opt-titulo').innerText = p.nombre;
                const c = document.getElementById('opt-container'); c.innerHTML = '';
                p.sub.forEach(s => {
                    c.innerHTML += `<button onclick="sumarFinal('${s}')" class="bg-zinc-800 py-4 rounded-xl text-lg font-black tap border-b-2 border-black uppercase text-white">${s}</button>`;
                });
                document.getElementById('m-opciones').style.display = 'flex';
            } else { sumarDirecto(p, p.precio, p.nombre); }
        }

        function sumarFinal(sub) {
            let extra = (sub === 'Con Patacón') ? 1000 : 0;
            sumarDirecto(tempProd, tempProd.precio + extra, `${tempProd.nombre} (${sub})`);
            cerrarOpciones();
        }

        function sumarDirecto(p, precio, nombreFull) {
            pedido += precio; p.cant--;
            listaPedido.push({ nombre: nombreFull, precio: precio });
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function addDomi() {
            const v = parseInt(prompt("VALOR DOMI:"));
            if(v) { pedido += v; listaPedido.push({ nombre: "Domi", precio: v }); document.getElementById('t-ped').innerText = "$ " + f(pedido); }
        }

        function doCobro() {
            if(pedido === 0) return;
            const h = store.h_ventas || [];
            listaPedido.forEach(i => h.push({ n: i.nombre, v: i.precio, u: usuarioActual, t: new Date().toLocaleTimeString() }));
            db.ref('/v10').update({ ventas: store.ventas + pedido, stock: store.stock, h_ventas: h }).then(() => {
                pedido = 0; listaPedido = []; document.getElementById('t-ped').innerText = "$ 0";
            });
        }

        function abrirGasto() {
            const v = parseInt(prompt("VALOR:")); const d = prompt("DETALLE:");
            if(v && d) {
                const h = store.h_gastos || []; h.push({ v, d, u: usuarioActual });
                db.ref('/v10').update({ gastos: (store.gastos || 0) + v, h_gastos: h });
            }
        }

        function verRepo() {
            let rU = {};
            if(store.h_ventas) store.h_ventas.forEach(v => { rU[v.u] = (rU[v.u] || 0) + v.v; });
            let t = `REPORTE:\n`;
            for(let u in rU) t += `👤 ${u}: $${f(rU[u])}\n`;
            t += `\n💰 TOTAL: $${f(store.ventas)}\n💸 GASTOS: $${f(store.gastos)}`;
            alert(t);
            if(confirm("REINICIAR DÍA?")) db.ref('/v10').update({ ventas: 0, gastos: 0, h_ventas: [], h_gastos: [] });
        }

        function accesoAdmin() {
            if(prompt("CLAVE:") === CLAVE) {
                document.getElementById('m-admin').style.display='flex';
                actAdmin();
            }
        }
