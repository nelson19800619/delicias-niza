<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza - Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal.active { display: flex; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-48">

    <header class="bg-gradient-to-b from-red-700 to-red-900 p-6 rounded-b-[45px] sticky top-0 z-40 shadow-2xl border-b border-white/10">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black italic tracking-tighter text-yellow-400 uppercase">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="abrirConfig()" class="bg-white/10 p-2 rounded-xl text-lg">⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase">📊 Cierre</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center">
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Base</span><span id="txt-base" class="text-[10px] font-bold text-blue-300">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Ventas</span><span id="txt-ventas" class="text-[10px] font-bold text-green-400">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50 uppercase">Gastos</span><span id="txt-gastos" class="text-[10px] font-bold text-red-400">$0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-2xl border border-orange-500/30"><span class="text-[7px] block opacity-50 uppercase font-black text-yellow-500">Total</span><span id="txt-total" class="text-[10px] font-black text-yellow-400">$0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-4 rounded-[25px] mb-4 border-2 border-slate-800">
            <div class="flex items-center gap-3">
                <div id="icon-domi" class="text-2xl grayscale opacity-50">🛵</div>
                <p class="font-black text-[11px] uppercase tracking-tighter">¿DOMICILIO? (+$2.000)</p>
            </div>
            <div id="check-ui" class="w-6 h-6 rounded-full border-2 border-slate-700"></div>
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>

        <div class="mt-6">
            <h3 class="text-[9px] font-black uppercase text-slate-500 mb-2 ml-1 italic">Últimos Movimientos</h3>
            <div id="historial-lista" class="space-y-1 bg-slate-900/30 p-2 rounded-2xl"></div>
        </div>
    </main>

    <div id="modal-config" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[35px] p-6 max-h-[85vh] flex flex-col">
            <h2 class="text-xl font-black mb-4 text-center text-yellow-500 italic uppercase">Configurar Inventario</h2>
            <div id="config-items" class="overflow-y-auto space-y-4 pr-2 scroll-hide">
                </div>
            <div class="mt-6 flex gap-2">
                <button onclick="cerrarConfig()" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold text-sm uppercase">Cerrar</button>
                <button onclick="guardarConfig()" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-sm uppercase">Guardar Todo</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[35px] p-8">
            <h2 class="text-xl font-black mb-4 text-center text-red-500 uppercase italic">Gasto Manual</h2>
            <input type="number" id="m-gasto" placeholder="Valor $" class="w-full bg-slate-800 p-4 rounded-xl mb-3 text-white text-xl font-mono text-center outline-none border border-slate-700">
            <input type="text" id="n-gasto" placeholder="¿En qué?" class="w-full bg-slate-800 p-4 rounded-xl mb-6 text-white text-sm outline-none border border-slate-700">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase">Registrar</button>
            <button onclick="cerrarModales()" class="w-full mt-4 text-slate-500 text-xs font-bold uppercase">Volver</button>
        </div>
    </div>

    <div id="modal-extra" class="modal px-6">
        <div class="bg-white text-slate-900 w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h2 class="text-xl font-black text-center mb-6 italic">ACOMPAÑANTE</h2>
            <button onclick="venderConExtra(0)" class="w-full bg-amber-50 border-b-4 border-amber-400 p-5 rounded-2xl mb-3 tap-active font-black text-amber-900 text-lg text-left italic font-mono">🥔 PAPA</button>
            <button onclick="venderConExtra(1000)" class="w-full bg-emerald-50 border-b-4 border-emerald-400 p-5 rounded-2xl tap-active font-black text-emerald-900 text-lg text-left italic font-mono">🍌 PATACÓN</button>
        </div>
    </div>

    <footer class="fixed bottom-4 left-4 right-4 bg-white rounded-[35px] p-4 flex justify-between items-center shadow-2xl z-50">
        <div>
            <span class="text-[8px] block font-black text-slate-400 uppercase tracking-widest mb-1">Total Pedido</span>
            <span id="total-ticket" class="text-3xl font-black text-slate-900 italic font-mono leading-none">$0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirGasto()" class="bg-red-50 text-red-500 h-14 w-12 rounded-2xl flex items-center justify-center text-xl tap-active">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-500 text-white h-14 w-20 rounded-2xl flex items-center justify-center text-2xl shadow-lg tap-active uppercase font-black text-xs">COBRAR</button>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let appData = { stock: [], ventas: 0, gastos: 0, base: 0, logs: [] };
        let tempTotal = 0;
        let pActivo = null;
        let esDomi = false;

        database.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) { appData = data; render(); } else { initDB(); }
        });

        function initDB() {
            database.ref('/').set({
                base: 0, ventas: 0, gastos: 0,
                stock: [
                    { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 10, icon: "🥟", extra: false },
                    { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 10, icon: "🧀", extra: false },
                    { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 10, icon: "🌽", extra: false },
                    { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 10, icon: "🍍", extra: false },
                    { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 10, icon: "🍖", extra: true },
                    { id: 6, nombre: "Pinchos", precio: 8000, cant: 10, icon: "🍢", extra: true },
                    { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 10, icon: "🍓", extra: false },
                    { id: 8, nombre: "Limonada", precio: 1000, cant: 10, icon: "🥤", extra: false }
                ],
                logs: [{time: new Date().toLocaleTimeString(), msg: "SISTEMA LISTO", tipo: 'info'}]
            });
        }

        function render() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            appData.stock.forEach(p => {
                grid.innerHTML += `
                    <div onclick="clickProd(${p.id})" class="bg-slate-900 border border-white/5 p-4 rounded-[30px] tap-active relative">
                        <div class="text-3xl mb-1">${p.icon}</div>
                        <h3 class="text-[9px] font-black uppercase opacity-60 leading-none">${p.nombre}</h3>
                        <p class="text-orange-400 font-mono font-bold text-xs">$${p.precio.toLocaleString()}</p>
                        <span class="text-[8px] font-bold ${p.cant < 5 ? 'text-red-500 animate-pulse' : 'text-slate-600'}">STOCK: ${p.cant}</span>
                    </div>
                `;
            });

            document.getElementById('txt-base').innerText = `$${appData.base.toLocaleString()}`;
            document.getElementById('txt-ventas').innerText = `$${appData.ventas.toLocaleString()}`;
            document.getElementById('txt-gastos').innerText = `$${appData.gastos.toLocaleString()}`;
            const neto = appData.base + appData.ventas - appData.gastos;
            document.getElementById('txt-total').innerText = `$${neto.toLocaleString()}`;

            const hLista = document.getElementById('historial-lista');
            hLista.innerHTML = '';
            const ultimos = (appData.logs || []).slice(-5).reverse();
            ultimos.forEach(l => {
                hLista.innerHTML += `<div class="text-[9px] border-b border-white/5 py-1 flex justify-between">
                    <span class="opacity-40 font-mono">${l.time}</span>
                    <span class="font-bold ${l.tipo === 'v' ? 'text-green-400' : l.tipo === 'g' ? 'text-red-400' : 'text-blue-300'}">${l.msg}</span>
                </div>`;
            });
        }

        function clickProd(id) {
            pActivo = appData.stock.find(x => x.id === id);
            if(pActivo.cant <= 0) return alert("❌ AGOTADO");
            if(pActivo.extra) document.getElementById('modal-extra').classList.add('active');
            else procesarItem(0);
        }

        function venderConExtra(ex) { procesarItem(ex); cerrarModales(); }

        function procesarItem(extra) {
            tempTotal += (pActivo.precio + extra);
            pActivo.cant--;
            document.getElementById('total-ticket').innerText = `$${tempTotal.toLocaleString()}`;
        }

        function finalizarVenta() {
            if(tempTotal === 0) return;
            if(esDomi) tempTotal += 2000;
            const log = { time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), msg: `Venta: $${tempTotal.toLocaleString()}${esDomi ? ' (DOM)' : ''}`, tipo: 'v' };
            database.ref('/').update({ ventas: appData.ventas + tempTotal, stock: appData.stock, logs: [...(appData.logs || []), log] });
            tempTotal = 0; if(esDomi) toggleDomi();
            document.getElementById('total-ticket').innerText = `$0`;
        }

        // --- FUNCIONES DE CONFIGURACIÓN (VALORES INICIALES) ---
        function abrirConfig() {
            const container = document.getElementById('config-items');
            container.innerHTML = '';
            
            // Campo para Base de Caja
            container.innerHTML += `
                <div class="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 mb-4">
                    <label class="text-[10px] font-black text-blue-300 uppercase block mb-1">💰 Base de Caja Hoy</label>
                    <input type="number" id="conf-base" value
