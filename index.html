<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza Pro - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-44">

    <header class="bg-gradient-to-b from-red-600 to-red-900 p-6 rounded-b-[50px] sticky top-0 z-40 shadow-2xl border-b border-white/10">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-yellow-400 uppercase">Delicias Niza</h1>
                <p id="reloj" class="text-[10px] font-bold opacity-70"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirBase()" class="bg-white/10 p-2 rounded-xl text-[9px] font-bold border border-white/20">💰 Base</button>
                <button onclick="verReporte()" class="bg-black/40 p-2 rounded-xl text-[9px] font-bold">📊 Cierre</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center">
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase">Base</span>
                <span id="txt-base" class="text-xs font-bold text-blue-300">$0</span>
            </div>
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase font-black">Ventas</span>
                <span id="txt-ventas" class="text-xs font-bold text-green-400">$0</span>
            </div>
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase font-black">Gastos</span>
                <span id="txt-gastos" class="text-xs font-bold text-red-400">$0</span>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-2xl border border-orange-500/30">
                <span class="text-[8px] block opacity-50 uppercase font-black">Caja</span>
                <span id="txt-total" class="text-xs font-black text-yellow-400">$0</span>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div class="flex items-center justify-between bg-slate-900/50 p-4 rounded-3xl mb-4 border border-white/5">
            <span class="font-bold text-sm">🛵 ¿Es Domicilio? (+$2.000)</span>
            <input type="checkbox" id="check-domi" class="w-6 h-6 accent-red-600">
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>

        <div class="mt-8">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-3 ml-2 italic">Últimos Movimientos</h3>
            <div id="historial-lista" class="space-y-2 bg-slate-900/30 p-2 rounded-3xl min-h-[100px]"></div>
        </div>
    </main>

    <div id="modal-base" class="modal px-6">
        <div class="bg-slate-900 p-8 rounded-[40px] w-full border border-slate-700">
            <h2 class="text-xl font-black mb-4 text-center">💸 BASE INICIAL</h2>
            <input type="number" id="input-base" placeholder="Monto base $" class="w-full bg-slate-800 p-4 rounded-2xl mb-6 text-white text-xl outline-none border border-slate-600">
            <button onclick="guardarBase()" class="w-full bg-blue-600 py-4 rounded-2xl font-black tap-active">INICIAR DÍA</button>
            <button onclick="cerrarModales()" class="w-full mt-4 text-slate-500 text-xs">CERRAR</button>
        </div>
    </div>

    <div id="modal-extra" class="modal px-6">
        <div class="bg-white text-slate-900 w-full rounded-[45px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-center mb-6 italic">ACOMPAÑANTE</h2>
            <button onclick="venderConExtra(0)" class="w-full bg-amber-100 border-b-8 border-amber-500 p-6 rounded-3xl mb-4 tap-active font-black text-amber-900 text-xl text-left">🥔 CON PAPA</button>
            <button onclick="venderConExtra(1000)" class="w-full bg-emerald-100 border-b-8 border-emerald-500 p-6 rounded-3xl tap-active font-black text-emerald-900 text-xl text-left">🍌 CON PATACÓN</button>
            <button onclick="cerrarModales()" class="w-full mt-6 text-slate-400 font-bold text-xs uppercase text-center">CANCELAR</button>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full rounded-[40px] p-8">
            <h2 class="text-xl font-black mb-4 text-center">REGISTRAR GASTO</h2>
            <input type="number" id="m-gasto" placeholder="Valor $" class="w-full bg-slate-800 p-4 rounded-2xl mb-3 text-white">
            <input type="text" id="n-gasto" placeholder="¿En qué?" class="w-full bg-slate-800 p-4 rounded-2xl mb-6 text-white">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-2xl font-black">REGISTRAR SALIDA</button>
            <button onclick="cerrarModales()" class="w-full mt-4 text-slate-500 text-xs uppercase">CERRAR</button>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[40px] p-6 flex justify-between items-center shadow-2xl z-50">
        <div>
            <span class="text-[9px] block font-black text-slate-400 uppercase">Orden Actual</span>
            <span id="total-ticket" class="text-4xl font-black text-slate-900 italic font-mono leading-none">$0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirGasto()" class="bg-red-100 text-red-600 h-16 w-12 rounded-2xl flex items-center justify-center text-xl tap-active shadow-sm border border-red-200">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-500 text-white h-16 w-20 rounded-3xl flex items-center justify-center text-3xl shadow-lg tap-active uppercase font-black text-sm tracking-tighter">COBRAR</button>
        </div>
    </footer>

    <script>
        // CONFIGURACIÓN FIREBASE (Tus credenciales de Delicias Niza)
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let appData = { stock: [], ventas: 0, gastos: 0, base: 0, logs: [] };
        let tempTotal = 0;
        let pActivo = null;

        // --- CEREBRO REALTIME ---
        database.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                appData = data;
                render();
            } else { initDB(); }
        });

        function initDB() {
            database.ref('/').set({
                base: 0, ventas: 0, gastos: 0,
                stock: [
                    { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 4, icon: "🥟", extra: false },
                    { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 4, icon: "🧀", extra: false },
                    { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 4, icon: "🌽", extra: false },
                    { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 4, icon: "🍍", extra: false },
                    { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 5, icon: "🍖", extra: true },
                    { id: 6, nombre: "Pinchos", precio: 8000, cant: 15, icon: "🍢", extra: true },
                    { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 30, icon: "🍓", extra: false },
                    { id: 8, nombre: "Limonada", precio: 1000, cant: 50, icon: "🥤", extra: false }
                ],
                logs: [{time: new Date().toLocaleTimeString(), msg: "SISTEMA INICIADO", tipo: 'info'}]
            });
        }

        function render() {
            // Render de Productos
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            appData.stock.forEach(p => {
                grid.innerHTML += `
                    <div onclick="clickProd(${p.id})" class="bg-slate-900 border border-white/5 p-4 rounded-[35px] tap-active relative overflow-hidden">
                        <div class="text-4xl mb-2">${p.icon}</div>
                        <h3 class="text-[10px] font-black uppercase opacity-60 leading-none">${p.nombre}</h3>
                        <p class="text-orange-400 font-mono font-bold">$${p.precio.toLocaleString()}</p>
                        <span class="text-[9px] font-bold ${p.cant < 5 ? 'text-red-500 animate-pulse' : 'text-slate-600'} italic">S: ${p.cant}</span>
                    </div>
                `;
            });

            // Render de Dashboard
            document.getElementById('txt-base').innerText = `$${appData.base.toLocaleString()}`;
            document.getElementById('txt-ventas').innerText = `$${appData.ventas.toLocaleString()}`;
            document.getElementById('txt-gastos').innerText = `$${appData.gastos.toLocaleString()}`;
            const neto = appData.base + appData.ventas - appData.gastos;
            document.getElementById('txt-total').innerText = `$${neto.toLocaleString()}`;

            // Render Historial (Últimos 5)
            const hLista = document.getElementById('historial-lista');
            hLista.innerHTML = '';
            const ultimos = (appData.logs || []).slice(-5).reverse();
            ultimos.forEach(l => {
                hLista.innerHTML += `<div class="text-[10px] border-b border-white/5 py-2 px-2 flex justify-between">
                    <span class="opacity-50">${l.time}</span>
                    <span class="font-bold ${l.tipo === 'v' ? 'text-green-400' : l.tipo === 'g' ? 'text-red-400' : 'text-blue-300'}">${l.msg}</span>
                </div>`;
            });

            document.getElementById('reloj').innerText = new Date().toLocaleDateString('es-CO', { weekday:'long', day:'numeric', month:'short'});
        }

        function clickProd(id) {
            pActivo = appData.stock.find(x => x.id === id);
            if(pActivo.cant <= 0) return alert("❌ SIN STOCK");
            if(pActivo.extra) document.getElementById('modal-extra').classList.add('active');
            else procesarItem(0);
        }

        function venderConExtra(ex) {
            procesarItem(ex);
            cerrarModales();
        }

        function procesarItem(extra) {
            tempTotal += (pActivo.precio + extra);
            pActivo.cant--;
            document.getElementById('total-ticket').innerText = `$${tempTotal.toLocaleString()}`;
        }

        function finalizarVenta() {
            if(tempTotal === 0) return;
            const isDomi = document.getElementById('check-domi').checked;
            if(isDomi) tempTotal += 2000;

            const nuevaVenta = appData.ventas + tempTotal;
            const log = {
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                msg: `Venta: $${tempTotal.toLocaleString()}${isDomi ? ' (Domicilio)' : ''}`,
                tipo: 'v'
            };

            database.ref('/').update({
                ventas: nuevaVenta,
                stock: appData.stock,
                logs: [...(appData.logs || []), log]
            });

            tempTotal = 0;
            document.getElementById('check-domi').checked = false;
            document.getElementById('total-ticket').innerText = `$0`;
            alert("✅ VENTA EXITOSA");
        }

        function guardarBase() {
            const b = parseInt(document.getElementById('input-base').value);
            if(isNaN(b)) return;
            database.ref('base').set(b);
            cerrarModales();
        }

        function guardarGasto() {
            const v = parseInt(document.getElementById('m-gasto').value);
            const n = document.getElementById('n-gasto').value;
            if(isNaN(v)) return;
            
            const log = {
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                msg: `GASTO: ${n} (-$${v.toLocaleString()})`,
                tipo: 'g'
            };

            database.ref('/').update({
                gastos: appData.gastos + v,
                logs: [...(appData.logs || []), log]
            });
            cerrarModales();
        }

        function verReporte() {
            const neto = appData.base + appData.ventas - appData.gastos;
            alert(`📊 REPORTE DELICIAS NIZA\n------------------\n+ Base Caja: $${appData.base.toLocaleString()}\n+ Total Ventas: $${appData.ventas.toLocaleString()}\n- Gastos: $${appData.gastos.toLocaleString()}\n------------------\n💰 SALDO EN CAJA: $${neto.toLocaleString()}`);
            if(confirm("¿Deseas REINICIAR todo para un nuevo día?")) {
                initDB();
            }
        }

        function abrirBase() { document.getElementById('modal-base').classList.add('active'); }
        function abrirGasto() { document.getElementById('modal-gasto').classList.add('active'); }
        function cerrarModales() { 
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('input-base').value = '';
            document.getElementById('m-gasto').value = '';
        }
    </script>
</body>
</html>
