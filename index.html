<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA V40 HYBRID</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000; 
            color: white; 
            font-family: ui-sans-serif, system-ui, sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* CABECERA AJUSTADA PARA MOSTRAR NOMBRES Y VALORES */
        .niza-header { 
            height: 85px; 
            background: #7f1d1d; 
            border-bottom: 2px solid #fbbf24; 
            padding: 6px 10px;
            flex-shrink: 0;
            z-index: 100;
        }

        .niza-main { 
            display: flex; 
            flex: 1; 
            overflow: hidden;
            background: #000;
        }

        .col-izq { width: 55%; overflow-y: auto; padding: 8px; border-right: 1px solid #27272a; }
        .col-der { width: 45%; overflow-y: auto; padding: 8px; background: #09090b; }

        /* FOOTER FIJO CON PROTECCIÓN */
        .niza-footer { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111; 
            border-top: 1px solid #3f3f46; 
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .contenedor-botones {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2.5fr;
            gap: 8px;
            padding: 10px;
        }

        .btn-tool {
            background: #27272a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 55px;
            border: 1px solid #52525b;
        }
        .btn-tool b { font-size: 9px; color: #fff; text-transform: uppercase; margin-top: 2px; }

        .btn-pay {
            background: #15803d;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 55px;
            border-bottom: 3px solid #14532d;
        }

        .linea-final {
            height: 22px;
            background: #fbbf24;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .linea-final span { color: #000; font-size: 8px; font-weight: 900; letter-spacing: 1px; }

        .item-cart { display: flex; justify-content: space-between; align-items: center; background: #18181b; padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid #f97316; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header class="niza-header">
        <div class="flex justify-between items-center mb-2">
            <h1 class="font-black italic text-xs text-yellow-400">NIZA ELITE V40</h1>
            <div class="flex gap-2">
                <button onclick="verConsultas()" class="bg-blue-600 px-2 py-1 rounded text-[10px] font-bold tap uppercase">Consultas</button>
                <button onclick="verHistorial()" class="bg-zinc-800 px-3 py-1 rounded text-[10px] tap">🕒</button>
                <button onclick="accesoAdmin()" class="bg-zinc-800 px-3 py-1 rounded text-[10px] tap">⚙️</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-black/40 rounded py-1 border border-white/5">
                <p class="text-[7px] uppercase font-bold text-zinc-400">Ventas</p>
                <p class="text-green-400 text-[11px] font-black leading-none" id="v-ventas">$ 0</p>
            </div>
            <div class="bg-black/40 rounded py-1 border border-white/5">

                <p class="text-red-400 text-[11px] font-black leading-none" id="v-gastos">$ 0</p>
            </div>
            <div class="bg-orange-600 rounded py-1 shadow-inner">
                <p class="text-[7px] uppercase font-bold text-orange-100">Caja Total</p>
                <p class="text-white text-[11px] font-black leading-none" id="v-total">$ 0</p>
            </div>
        </div>
    </header>

    <div class="niza-main">
        <div class="col-izq">
            <input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 Buscar..." class="w-full bg-zinc-900 text-white p-2 rounded-lg mb-3 border border-zinc-800 text-sm outline-none focus:border-yellow-500">
            <div id="menu" class="grid grid-cols-2 gap-2"></div>
        </div>
        <div class="col-der">
            <div id="lista-carrito">
                </div>
        </div>
    </div>

    <footer class="niza-footer">
        <div class="contenedor-botones">
            <button onclick="addDomi()" class="btn-tool text-blue-400 tap">
                <span>🛵</span> <b>Domi</b>
            </button>
            <button onclick="aplicarDescuento()" class="btn-tool text-orange-400 tap">
                <span>🏷️</span> <b>Desc</b>
            </button>
            <button onclick="abrirGasto()" class="btn-tool text-red-400 tap">
                <span>💸</span> <b>Gasto</b>
            </button>
            
            <button onclick="irAPagar()" class="btn-pay tap">
                <div class="text-right">
                    <p class="text-[8px] font-black uppercase opacity-80">Finalizar</p>
                    <p id="t-ped" class="text-lg font-black leading-none">$ 0</p>
                </div>
                <span class="text-xl">💰</span>
            </button>
        </div>
        <div class="linea-final">
            <span>NIZA SISTEMA DE CONTROL V40</span>
        </div>
    </footer>

    <div id="m-pago" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl w-80 border border-green-600 text-center shadow-2xl">
            <h2 class="text-white font-black mb-6 uppercase italic tracking-widest">¿Medio de Pago?</h2>
            <button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-5 rounded-2xl text-xl font-black mb-4 tap text-white shadow-lg">💵 EFECTIVO</button>
            <button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-5 rounded-2xl text-xl font-black tap text-white shadow-lg">📱 TRANSF.</button>
            <button onclick="cerrarModales()" class="mt-6 text-zinc-500 font-bold uppercase text-xs">← Volver</button>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-yellow-500 text-center shadow-2xl"><h2 class="text-white font-black mb-4 uppercase text-sm italic text-yellow-500">¿Quién atiende?</h2><div class="grid grid-cols-2 gap-2" id="user-btns"></div></div></div>
    <div id="m-opciones" class="modal"><div class="bg-zinc-900 p-5 rounded-2xl w-72 border border-orange-500 shadow-2xl"><h2 id="opt-t" class="text-yellow-400 font-black mb-4 uppercase text-center text-xs">Opciones</h2><div id="opt-c" class="flex flex-col gap-2"></div><button onclick="cerrarModales()" class="mt-4 text-zinc-600 text-[10px] w-full text-center uppercase font-bold">Volver</button></div></div>
