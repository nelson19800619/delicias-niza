<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA POS V9 - CONTROL TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; }
        body { -webkit-tap-highlight-color: transparent; background-color: #000; color: white; user-select: none; overflow-x: hidden; }
        main { padding-bottom: 120px; min-height: 100vh; }
        .card-prod { background: linear-gradient(145deg, #151515, #050505); border: 1px solid #222; }
    </style>
</head>
<body>

    <header class="bg-gradient-to-r from-red-900 to-red-700 p-3 sticky top-0 shadow-2xl z-50 border-b-2 border-yellow-500">
        <div class="flex justify-between items-center mb-1">
            <div>
                <h1 class="font-black italic text-white text-lg leading-none uppercase">DELICIAS NIZA</h1>
                <span class="text-[8px] text-yellow-400 font-bold uppercase italic">Turno: <span id="u-actual" class="underline text-white">---</span></span>
            </div>
            <div class="flex gap-2">
                <button onclick="pedirUsuario()" class="bg-black/40 p-2 rounded-lg tap text-xs">👤</button>
                <button onclick="accesoAdmin()" class="bg-black/40 p-2 rounded-lg tap text-xs">⚙️</button>
                <button onclick="verRepo()" class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-black text-[9px] tap uppercase italic">Cierre</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-[7px] text-center font-bold uppercase">
            <div class="bg-black/50 p-1 rounded">Ventas<br><span id="v-ventas" class="text-green-400 text-[10px] font-mono">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded">Gastos<br><span id="v-gastos" class="text-red-400 text-[10px] font-mono">$ 0</span></div>
            <div class="bg-orange-600 p-1 rounded text-white font-black shadow-lg">Caja<br><span id="v-total" class="text-[10px] font-mono">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded">Base<br><span id="v-base" class="text-blue-300 text-[10px] font-mono">$ 0</span></div>
        </div>
    </header>

    <main id="menu" class="p-4 grid grid-cols-2 gap-4">
        <div class="col-span-2 text-center text-zinc-600 animate-pulse mt-20">Cargando productos...</div>
    </main>

    <div id="m-user" class="modal px-6" style="display: flex;">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-sm border-2 border-yellow-500 text-center shadow-2xl">
            <h2 class="text-white font-black mb-6 uppercase text-xl italic italic">¿Quién atiende?</h2>
            <div class="flex flex-col gap-4">
                <button onclick="setUsuario('Nelson')" class="bg-orange-600 py-5 rounded-2xl text-xl font-black tap border-b-4 border-orange-950 uppercase italic">Nelson</button>
                <button onclick="setUsuario('Empleado 1')" class="bg-zinc-800 py-5 rounded-2xl text-xl font-black tap uppercase text-zinc-300 italic border-b-4 border-black">Empleado 1</button>
            </div>
        </div>
    </div>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-[40px] w-full max-w-sm border-2 border-orange-500">
            <h2 id="opt-titulo" class="text-yellow-400 font-black mb-6 uppercase text-xl text-center italic">Opción</h2>
            <div id="opt-container" class="grid grid-cols-1 gap-3"></div>
            <button onclick="cerrarOpciones()" class="mt-6 text-zinc-500 font-bold uppercase text-[10px] w-full text-center">← Volver</button>
        </div>
    </div>

    <div id="m-admin" class="modal px-4"><div class="bg-zinc-900 p-5 rounded-[30px] w-full max-w-md max-h-[85vh] flex flex-col border border-zinc-700 shadow-2xl">
        <h2 class="text-yellow-500 font-black text-center mb-4 uppercase text-sm italic italic">Ajustes Niza</h2>
        <div class="mb-3">
            <label class="text-[8px] text-zinc-500 uppercase font-black italic">Base de Caja ($)</label>
            <input type="number" id="a-base" class="w-full bg-zinc-800 p-3 rounded-xl text-xl text-white font-mono text-center outline-none border border-zinc-700">
        </div>
        <div id="a-items" class="overflow-y-auto flex-1 space-y-3 mb-4 pr-1"></div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('m-admin').style.display='none'" class="flex-1 bg-zinc-800 py-4 rounded-xl text-[10px] font-black italic">CERRAR</button>
            <button onclick="saveAdmin()" class="flex-1 bg-green-600 py-4 rounded-xl text-[10px] font-black uppercase shadow-lg">Guardar Cambios ✅</button>
        </div>
    </div></div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white p-3 flex justify-between items-center z-50 rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.6)] h-[95px]">
        <div class="pl-2">
            <span class="text-zinc-400 text-[8px] block uppercase font-black leading-none mb-1 italic">Total en curso</span>
            <span id="t-ped" class="text-4xl font-black text-black font-mono italic tracking-tighter leading-none">$ 0</span>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="addDomi()" class="bg-blue-50 text-blue-600 w-10 h-12 rounded-xl text-xl tap flex items-center justify-center border border-blue-100">🛵</button>
            <button onclick="abrirGasto()" class="bg-red-50 text-red-600 w-10 h-12 rounded-xl text-xl tap flex items-center justify-center border border-red-100">💸</button>
            <button onclick="doCobro()" class="bg-green-600 text-white w-20 h-16 rounded-2xl text-4xl tap shadow-2xl flex items-center justify-center font-black italic border-b-4 border-green-800">💰</button>
        </div>
    </footer>

    <script>
        const CLAVE = "1234";
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedido = 0, tempProd = null, listaPedido = [], usuarioActual = "---";

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        function setUsuario(n) { 
            usuarioActual = n; 
            document.getElementById('u-actual').innerText = n; 
            document.getElementById('m-user').style.display='none'; 
        }

        function pedirUsuario() { document.getElementById('m-user').style.display='flex'; }

        // CARGA Y REFRESCO AUTOMÁTICO
        db.ref('/v9').on('value', (s) => {
            store = s.val();
            if(!store || !store.stock) {
                const init = [
                    { id: 1, nombre: "Empanada", precio: 4000, cant: 50, icon: "🥟", sub: ["Carne", "Pollo", "Queso"] },
                    { id: 2, nombre: "Rellena", precio: 7000, cant: 20, icon: "🍖", sub: ["Con Papa", "Con Patacón"] },
                    { id: 3, nombre: "Pincho", precio: 8000, cant: 20, icon: "🍢", sub: ["Con Papa", "Con Patacón"] },
                    { id: 4, nombre: "Fresas", precio: 14000, cant: 15, icon: "🍓" },
                    { id: 5, nombre: "Bebida", precio: 2000, cant: 30, icon: "🥤" }
                ];
                db.ref('/v9').set({ base: 0, ventas: 0, gastos: 0, stock: init, h_ventas: [], h_gastos: [] });
            } else { 
                draw(); 
            }
        });

        function draw() {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                m.innerHTML += `<div onclick="abrirOpciones(${p.id})" class="card-prod p-4 rounded-[30px] tap text-center shadow-xl">
                    <div class="text-4xl mb-1">${p.icon}</div>
                    <div class="text-[9px] font-black uppercase text-zinc-400 leading-none h-4 mb-1">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-sm font-mono italic">$ ${f(p.precio)}</div>
                    <div class="text-[7px] text-green-600 font-bold mt-1 uppercase italic">Disp: ${p.cant}</div>
                </div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function abrirOpciones(id) {
            let p = store.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("❌ PRODUCTO AGOTADO");
            if(p.sub) {
                tempProd = p;
                document.getElementById('opt-titulo').innerText = p.nombre;
                const container = document.getElementById('opt-container');
                container.innerHTML = '';
                p.sub.forEach(sub => {
                    container.innerHTML += `<button onclick="sumarFinal('${sub}')" class="bg-zinc-800 py-5 rounded-2xl text-lg font-black tap border-b-4 border-black uppercase italic">${sub}</button>`;
                });
                document.getElementById('m-opciones').style.display = 'flex';
            } else { sumarDirecto(p, p.precio, p.nombre); }
        }

        function sumarFinal(sub) {
            let pExtra = (sub === 'Con Patacón') ? 1000 : 0;
            sumarDirecto(tempProd, tempProd.precio + pExtra, `${tempProd.nombre} (${sub})`);
            cerrarOpciones();
        }

        function sumarDirecto(p, precio, nombreFull) {
            pedido += precio; p.cant--;
            listaPedido.push({ nombre: nombreFull, precio: precio });
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function addDomi() {
            const v = parseInt(prompt("VALOR DOMICILIO:"));
            if(!v) return;
            pedido += v;
            listaPedido.push({ nombre: "Domicilio", precio: v });
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function doCobro() {
            if(pedido === 0) return;
            const h = store.h_ventas || [];
            listaPedido.forEach(item => h.push({ n: item.nombre, v: item.precio, u: usuarioActual, t: new Date().toLocaleTimeString() }));
            db.ref('/v9').update({ ventas: store.ventas + pedido, stock: store.stock, h_ventas: h }).then(() => {
                pedido = 0; listaPedido = []; document.getElementById('t-ped').innerText = "$ 0";
            });
        }

        function abrirGasto() {
            const v = parseInt(prompt("VALOR GASTO:"));
            const d = prompt("DESCRIPCIÓN:");
            if(!v || !d) return;
            const h = store.h_gastos || [];
            h.push({ v, d, u: usuarioActual, t: new Date().toLocaleTimeString() });
            db.ref('/v9').update({ gastos: (store.gastos || 0) + v, h_gastos: h });
        }

        function verRepo() {
            let resU = {};
            if(store.h_ventas) store.h_ventas.forEach(v => { resU[v.u] = (resU[v.u] || 0) + v.v; });
            let texto = `📊 REPORTE DEL DÍA:\n\n`;
            for(let u in resU) texto += `👤 ${u}: $${f(resU[u])}\n`;
            texto += `\n💰 VENTAS: $${f(store.ventas)}\n💸 GASTOS: $${f(store.gastos)}`;
            alert(texto);
            if(confirm("¿REINICIAR TODO? (Cierre de día)")) db.ref('/v9').update({ ventas: 0, gastos: 0, h_ventas: [], h_gastos: [] });
        }

        function accesoAdmin() {
            if(prompt("CLAVE ADMIN:") === CLAVE) {
                document.getElementById('m-admin').style.display='flex';
                actAdmin();
            }
        }

        function actAdmin() {
            const c = document.getElementById('a-items'); c.innerHTML = '';
            document.getElementById('a-base').value = store.base;
            store.stock.forEach((p, i) => {
                c.innerHTML += `<div class="bg-black/50 p-4 rounded-3xl border border-zinc-800 shadow-inner">
                    <input type="text" id="n-${i}" value="${p.nombre}" class="bg-transparent text-yellow-500 font-black uppercase text-xs mb-3 outline-none w-full">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[7px] text-zinc-600 font-black block mb-1">PRECIO ($)</label>
                            <input type="number" id="p-${i}" value="${p.precio}" class="w-full bg-zinc-800 p-2 rounded-lg text-orange-400 font-mono text-center outline-none">
                        </div>
                        <div>
                            <label class="text-[7px] text-zinc-600 font-black block mb-1">STOCK (CANT)</label>
                            <input type="number" id="ac-${i}" value
