<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA V32 FIXED</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        body { 
            background-color: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; /* Evita que la página entera se mueva */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* CABECERA FIJA */
        .cabecera { height: 80px; flex-shrink: 0; background: #991b1b; border-bottom: 2px solid #eab308; padding: 5px 10px; }
        
        /* CONTENIDO PRINCIPAL */
        .cuerpo { display: flex; flex: 1; overflow: hidden; }
        
        .izquierda { width: 55%; overflow-y: auto; padding: 5px; background: #050505; border-right: 1px solid #222; }
        
        /* COLUMNA DERECHA CON SCROLL INTERNO */
        .derecha { 
            width: 45%; 
            display: flex; 
            flex-direction: column; 
            background: #0a0a0a; 
            height: 100%; /* Ocupa todo el alto disponible */
        }

        #lista-carrito { 
            flex: 1; 
            overflow-y: auto; /* Solo el carrito hace scroll */
            padding: 5px;
        }

        /* ÁREA DE COBRO SIEMPRE VISIBLE AL FINAL */
        .seccion-cobro { 
            flex-shrink: 0; 
            background: #111; 
            border-top: 2px solid #333; 
            padding: 8px;
            padding-bottom: env(safe-area-inset-bottom, 8px); /* Para iPhone con barra abajo */
        }

        .item-carrito { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 6px; border-radius: 8px; margin-bottom: 4px; border-left: 3px solid #f97316; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 9px; color: #ccc; }
        th, td { border: 1px solid #333; padding: 4px; text-align: left; }
    </style>
</head>
<body>

    <header class="cabecera">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic text-xs text-yellow-400">NIZA V32 ELITE</h1>
            <div class="flex gap-1">
                <button onclick="verConsultas()" class="bg-blue-600 px-2 py-1 rounded text-xs tap">📊</button>
                <button onclick="verHistorial()" class="bg-zinc-800 px-2 py-1 rounded text-xs tap">🕒</button>
                <button onclick="accesoAdmin()" class="bg-zinc-800 px-2 py-1 rounded text-xs tap">⚙️</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-center">
            <div class="bg-black/40 rounded py-1"><p class="text-[7px] uppercase text-zinc-500">Ventas</p><p id="v-ventas" class="text-[10px] font-bold text-green-400">$ 0</p></div>
            <div class="bg-black/40 rounded py-1"><p class="text-[7px] uppercase text-zinc-500">Gastos</p><p id="v-gastos" class="text-[10px] font-bold text-red-400">$ 0</p></div>
            <div class="bg-orange-600 rounded py-1"><p class="text-[7px] uppercase text-white font-bold">Caja</p><p id="v-total" class="text-[10px] font-bold text-white">$ 0</p></div>
            <button onclick="verRepoDetallado()" class="bg-yellow-500 text-black rounded font-black text-[8px] uppercase tap">Cierre</button>
        </div>
    </header>

    <div class="cuerpo">
        <div class="izquierda">
            <input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 Buscar..." class="w-full bg-zinc-900 text-white p-2 rounded-lg mb-2 border border-zinc-800 text-xs outline-none">
            <div id="menu" class="grid grid-cols-2 gap-2"></div>
        </div>
        
        <div class="derecha">
            <div id="lista-carrito">
                </div>
            
            <div class="seccion-cobro">
                <div id="t-ped" class="text-3xl font-black text-white text-right leading-none mb-1">$ 0</div>
                <div id="info-desc" class="text-[9px] text-red-400 text-right font-bold h-3 uppercase mb-2"></div>
                
                <div class="grid grid-cols-4 gap-2 mb-2">
                    <button onclick="addDomi()" class="bg-zinc-800 text-blue-400 py-2 rounded-lg text-xl tap">🛵</button>
                    <button onclick="aplicarDescuento()" class="bg-zinc-800 text-orange-400 py-2 rounded-lg text-xl tap">🏷️</button>
                    <button onclick="abrirGasto()" class="bg-zinc-800 text-red-400 py-2 rounded-lg text-xl tap">💸</button>
                    <button onclick="limpiarPedido()" class="bg-zinc-900 text-zinc-600 py-2 rounded-lg text-[9px] font-black tap">X</button>
                </div>
                
                <button onclick="irAPagar()" class="w-full bg-green-600 text-white py-4 rounded-xl text-xl tap font-black shadow-lg border-b-4 border-green-800">
                    💰 COBRAR
                </button>
            </div>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-yellow-500 text-center shadow-2xl"><h2 class="text-white font-black mb-4 uppercase text-sm italic">¿Quién atiende?</h2><div class="grid grid-cols-2 gap-2" id="user-btns"></div></div></div>
    <div id="m-pago" class="modal"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-green-500 text-center"><h2 class="text-white font-black mb-6 uppercase text-sm">Medio de Pago</h2><button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-4 rounded-xl text-lg font-black mb-3 tap text-white">💵 Efectivo</button><button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-4 rounded-xl text-lg font-black tap text-white">📱 Transferencia</button><button onclick="cerrarModales()" class="mt-4 text-zinc-500 text-xs uppercase">Cancelar</button></div></div>
    <div id="m-opciones" class="modal"><div class="bg-zinc-900 p-5 rounded-2xl w-72 border border-orange-500 shadow-2xl"><h2 id="opt-t" class="text-yellow-400 font-black mb-4 uppercase text-center text-xs">Opciones</h2><div id="opt-c" class="flex flex-col gap-2"></div><button onclick="cerrarModales()" class="mt-4 text-zinc-600 text-[10px] w-full text-center uppercase font-bold">Volver</button></div></div>

    <script>
        // ... (Aquí va toda la lógica de Firebase que ya tienes, se mantiene igual)
        // Solo asegúrate de copiar los nombres de funciones que ya usas.
        
        // Re-inserto la lógica básica para que funcione el pegado:
        const CLAVE = "1234";
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedTot = 0, descAct = 0, carrito = [], uAct = "---", tempP = null;

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        function getColTime() {
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('en-CA', { timeZone: 'America/Bogota' });
            const hora = ahora.toLocaleTimeString('es-CO', { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', hour12: false });
            return { fecha, hora };
        }

        const users = ['Nelson', 'Jenny', 'Juan', 'Elizabeth', 'Valeria', 'Betty'];
        const uDiv = document.getElementById('user-btns');
        users.forEach(u => { uDiv.innerHTML += `<button onclick="setU('${u}')" class="bg-zinc-800 py-3 rounded-lg font-bold tap text-[10px] text-white uppercase">${u}</button>`; });

        function setU(n) {
            uAct = n; document.getElementById('m-user').style.display = 'none';
            db.ref('/niza_v31_rep').on('value', (snap) => {
                store = snap.val();
                if(store) draw();
            });
        }

        function draw(filtro = "") {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                if(filtro && !p.nombre.toLowerCase().includes(filtro)) return;
                m.innerHTML += `<div onclick="abrirOpt(${p.id})" class="bg-zinc-900 p-2 rounded-xl tap text-center border border-white/5">
                    <div class="text-xl mb-0.5">${p.icon}</div>
                    <div class="text-[8px] font-black uppercase text-zinc-400 leading-none h-4 flex items-center justify-center">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-[10px] mt-1">$ ${f(p.precio)}</div>
                </div>`;
            });
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function abrirOpt(id) { 
            let p = store.stock.find(x => x.id === id); 
            if(p.sub) { 
                tempP = p; document.getElementById('opt-t').innerText = p.nombre; const c = document.getElementById('opt-c'); c.innerHTML = ''; 
                p.sub.forEach((s, i) => { c.innerHTML += `<button onclick="sumarFinal(${i})" class="bg-zinc-800 py-3 rounded-xl text-xs font-black tap flex justify-between px-4"><span>${s.n}</span> <span class="text-green-500">${s.c}</span></button>`; }); 
                document.getElementById('m-opciones').style.display = 'flex'; 
            } else { addCarrito(p.id, p.nombre, p.precio, null); } 
        }

        function sumarFinal(i) { 
            let sO = tempP.sub[i]; 
            let ex = (sO.n === 'Con Patacón') ? 1000 : 0; 
            addCarrito(tempP.id, `${tempP.nombre} (${sO.n})`, tempP.precio + ex, i); 
            cerrarModales(); 
        }

        function addCarrito(id, n, v, si) { carrito.push({ id, n, v, si }); actualizarTotal(); }
        function actualizarTotal() {
            let b = carrito.reduce((a, x) => a + x.v, 0);
            pedTot = b - descAct;
            document.getElementById('t-ped').innerText = "$ " + f(pedTot);
            document.getElementById('info-desc').innerText = descAct > 0 ? `DESC: -$${f(descAct)}` : "";
            renderCarrito();
        }

        function renderCarrito() { 
            const c = document.getElementById('lista-carrito'); c.innerHTML = ''; 
            carrito.forEach((item, i) => { 
                c.innerHTML += `<div class="item-carrito"><div><p class="text-[9px] font-black uppercase text-white">${item.n}</p><p class="text-[8px] text-orange-400 font-bold">$ ${f(item.v)}</p></div><button onclick="quitarI(${i})" class="bg-red-900 text-white w-7 h-7 rounded-full tap text-xs">✕</button></div>`; 
            }); 
            // Auto-scroll al último item añadido
            c.scrollTop = c.scrollHeight;
        }

        function quitarI(i) { carrito.splice(i, 1); if(carrito.length===0) descAct=0; actualizarTotal(); }
        function irAPagar() { if(carrito.length > 0) document.getElementById('m-pago').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function buscar() { draw(document.getElementById('buscador').value.toLowerCase()); }
        function limpiarPedido() { if(confirm("¿Vaciar?")) { carrito=[]; descAct=0; actualizarTotal(); } }
        
        // El resto de funciones (doCobro, verHistorial, etc) se mantienen igual a tu versión anterior.
    </script>
</body>
</html>
