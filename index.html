<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA CLOUD V11</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; }
        body { background-color: #000; color: white; user-select: none; font-family: system-ui, -apple-system, sans-serif; }
        main { padding-bottom: 110px; }
        .btn-user { background: linear-gradient(145deg, #222, #111); border: 1px solid #444; }
    </style>
</head>
<body>

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-3 sticky top-0 shadow-2xl z-50 border-b-2 border-yellow-600">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic text-white text-lg tracking-tighter">NIZA CLOUD</h1>
            <div class="flex gap-2">
                <button onclick="accesoAdmin()" class="bg-black/40 p-2 rounded-lg text-lg tap">⚙️</button>
                <button onclick="verRepo()" class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-black text-[10px] tap">REPORTE</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-[7px] text-center font-bold uppercase">
            <div class="bg-black/50 p-1 rounded text-green-400">Ventas<br><span id="v-ventas" class="text-[10px] font-mono">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded text-red-400">Gastos<br><span id="v-gastos" class="text-[10px] font-mono">$ 0</span></div>
            <div class="bg-orange-600 p-1 rounded text-white shadow-lg">En Caja<br><span id="v-total" class="text-[10px] font-mono">$ 0</span></div>
            <div class="bg-black/50 p-1 rounded text-blue-300">Base<br><span id="v-base" class="text-[10px] font-mono">$ 0</span></div>
        </div>
    </header>

    <main id="menu" class="p-4 grid grid-cols-2 gap-4">
        <div class="col-span-2 text-center py-20 text-zinc-500 animate-pulse">Conectando con la nube...</div>
    </main>

    <div id="m-user" class="modal" style="display: flex;">
        <div class="bg-zinc-900 p-8 rounded-[40px] w-full max-w-sm border-2 border-yellow-500 text-center shadow-2xl">
            <p class="text-yellow-500 font-bold text-xs mb-2 tracking-widest uppercase">Bienvenido a Niza</p>
            <h2 class="text-white font-black mb-8 text-2xl italic uppercase">¿Quién entra?</h2>
            <button onclick="setUsuario('Nelson')" class="w-full bg-orange-600 py-6 rounded-3xl text-2xl font-black mb-4 tap shadow-lg border-b-4 border-orange-900 uppercase">Nelson</button>
            <button onclick="setUsuario('Empleado')" class="w-full bg-zinc-800 py-6 rounded-3xl text-2xl font-black tap border-b-4 border-black uppercase text-zinc-400">Empleado</button>
        </div>
    </div>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-[40px] w-full max-w-sm border-2 border-orange-500">
            <h2 id="opt-titulo" class="text-yellow-400 font-black mb-6 uppercase text-xl text-center italic">Sabor</h2>
            <div id="opt-container" class="flex flex-col gap-3"></div>
            <button onclick="cerrarOpciones()" class="mt-8 text-zinc-600 font-bold uppercase text-xs w-full text-center">← CANCELAR</button>
        </div>
    </div>

    <div id="m-admin" class="modal px-4"><div class="bg-zinc-900 p-5 rounded-[35px] w-full max-w-md max-h-[85vh] flex flex-col border border-zinc-700 shadow-2xl">
        <h2 class="text-orange-500 font-black text-center mb-4 uppercase italic">Panel de Control</h2>
        <div class="mb-4">
            <label class="text-[10px] text-zinc-500 uppercase font-black ml-2 italic">Base Inicial de Dinero</label>
            <input type="number" id="a-base" class="w-full bg-zinc-800 p-3 rounded-2xl text-xl text-white font-mono text-center border border-zinc-700 outline-none">
        </div>
        <div id="a-items" class="overflow-y-auto flex-1 space-y-3 mb-4 pr-1"></div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="document.getElementById('m-admin').style.display='none'" class="bg-zinc-800 py-4 rounded-2xl text-[10px] font-black uppercase">Salir</button>
            <button onclick="saveAdmin()" class="bg-green-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">Guardar ✅</button>
        </div>
    </div></div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white p-3 flex justify-between items-center z-50 rounded-t-[40px] shadow-[0_-5px_30px_rgba(0,0,0,0.8)] h-[95px]">
        <div class="pl-3">
            <span class="text-zinc-400 text-[9px] block uppercase font-black leading-none mb-1 italic">Total Pedido</span>
            <span id="t-ped" class="text-4xl font-black text-black font-mono italic leading-none">$ 0</span>
        </div>
        <div class="flex gap-2 items-center">
            <button onclick="addDomi()" class="bg-blue-100 text-blue-600 w-11 h-13 rounded-xl text-2xl tap flex items-center justify-center border border-blue-200 shadow-sm">🛵</button>
            <button onclick="abrirGasto()" class="bg-red-100 text-red-600 w-11 h-13 rounded-xl text-2xl tap flex items-center justify-center border border-red-200 shadow-sm">💸</button>
            <button onclick="doCobro()" class="bg-green-600 text-white w-24 h-18 rounded-[25px] text-5xl tap flex items-center justify-center font-black italic border-b-4 border-green-900 shadow-xl">💰</button>
        </div>
    </footer>

    <script>
        const CLAVE = "1234";
        // CONFIGURACIÓN DE TU NUBE (FIREBASE)
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedido = 0, tempProd = null, listaPedido = [], usuarioActual = "---";

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        function setUsuario(n) {
            usuarioActual = n;
            document.getElementById('m-user').style.display = 'none';
            conectarNube();
        }

        function conectarNube() {
            db.ref('/v11').on('value', (snapshot) => {
                store = snapshot.val();
                if(!store) {
                    // SI NO HAY NADA EN LA NUBE, CREAMOS EL NEGOCIO
                    const inicial = [
                        { id: 1, nombre: "Empanada", precio: 4000, cant: 50, icon: "🥟", sub: ["Carne", "Pollo", "Queso"] },
                        { id: 2, nombre: "Rellena", precio: 7000, cant: 20, icon: "🍖", sub: ["Con Papa", "Con Patacón"] },
                        { id: 3, nombre: "Pincho", precio: 8000, cant: 20, icon: "🍢", sub: ["Con Papa", "Con Patacón"] },
                        { id: 4, nombre: "Fresas", precio: 14000, cant: 15, icon: "🍓" },
                        { id: 5, nombre: "Bebida", precio: 2000, cant: 30, icon: "🥤" }
                    ];
                    db.ref('/v11').set({ base: 0, ventas: 0, gastos: 0, stock: inicial, h_ventas: [] });
                } else {
                    draw();
                }
            }, (error) => {
                alert("Error de conexión. Verifica internet.");
            });
        }

        function draw() {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                m.innerHTML += `<div onclick="abrirOpciones(${p.id})" class="bg-zinc-900 p-5 rounded-[35px] tap text-center shadow-lg border border-white/5 relative overflow-hidden">
                    <div class="text-4xl mb-1">${p.icon}</div>
                    <div class="text-[10px] font-black uppercase text-zinc-400 mb-1 leading-none">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-lg font-mono italic">$ ${f(p.precio)}</div>
                    <div class="text-[8px] ${p.cant < 5 ? 'text-red-500 animate-pulse' : 'text-green-500'} font-bold uppercase italic mt-1">Stock: ${p.cant}</div>
                </div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function abrirOpciones(id) {
            let p = store.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("❌ PRODUCTO AGOTADO");
            if(p.sub) {
                tempProd = p;
                document.getElementById('opt-titulo').innerText = p.nombre;
                const c = document.getElementById('opt-container'); c.innerHTML = '';
                p.sub.forEach(s => {
                    c.innerHTML += `<button onclick="sumarFinal('${s}')" class="bg-zinc-800 py-6 rounded-3xl text-xl font-black tap border-b-4 border-black uppercase text-white italic shadow-md">${s}</button>`;
                });
                document.getElementById('m-opciones').style.display = 'flex';
            } else { sumarDirecto(p, p.precio, p.nombre); }
        }

        function sumarFinal(sub) {
            let extra = (sub === 'Con Patacón') ? 1000 : 0;
            sumarDirecto(tempProd, tempProd.precio + extra, `${tempProd.nombre} (${sub})`);
            cerrarOpciones();
        }

        function sumarDirecto(p, precio, nombreFull) {
            pedido += precio; 
            p.cant--;
            listaPedido.push({ nombre: nombreFull, precio: precio });
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function addDomi() {
            const v = parseInt(prompt("VALOR DOMICILIO:"));
            if(v) { 
                pedido += v; 
                listaPedido.push({ nombre: "Domi", precio: v }); 
                document.getElementById('t-ped').innerText = "$ " + f(pedido); 
            }
        }

        function doCobro() {
            if(pedido === 0) return;
            const h = store.h_ventas || [];
            listaPedido.forEach(i => h.push({ n: i.nombre, v: i.precio, u: usuarioActual, t: new Date().toLocaleTimeString() }));
            db.ref('/v11').update({ ventas: store.ventas + pedido, stock: store.stock, h_ventas: h }).then(() => {
                pedido = 0; listaPedido = []; 
                document.getElementById('t-ped').innerText = "$ 0";
            });
        }

        function abrirGasto() {
            const v = parseInt(prompt("VALOR GASTO:"));
            const d = prompt("¿PARA QUÉ ES EL GASTO?");
            if(v && d) {
                db.ref('/v11').update({ gastos: (store.gastos || 0) + v });
            }
        }

        function verRepo() {
            let rU = {};
            if(store.h_ventas) store.h_ventas.forEach(v => { rU[v.u] = (rU[v.u] || 0) + v.v; });
            let t = `📊 RESUMEN DE HOY:\n\n`;
            for(let u in rU) t += `👤 ${u}: $${f(rU[u])}\n`;
            t += `\n💰 VENTAS TOTALES: $${f(store.ventas)}\n💸 GASTOS: $${f(store.gastos)}`;
            alert(t);
            if(confirm("¿CERRAR DÍA Y BORRAR VENTAS?")) {
                db.ref('/v11').update({ ventas: 0, gastos: 0, h_ventas: [] });
            }
        }

        function accesoAdmin() {
            if(prompt("CLAVE DE ACCESO:") === CLAVE) {
                document.getElementById('m-admin').style.display='flex';
                actAdmin();
            }
        }

        function actAdmin() {
            const c = document.getElementById('a-items'); c.innerHTML = '';
            document.getElementById('a-base').value = store.base;
            store.stock.forEach((p, i) => {
                c.innerHTML += `<div class="bg-black/50 p-4 rounded-3xl border border-zinc-800">
                    <input type="text" id="n-${i}" value="${p.nombre}" class="bg-transparent text-yellow-500 font-black uppercase text-xs mb-3 w-full outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center">
                            <span class="text-[7px] text-zinc-500 font-black block mb-1">PRECIO ($)</span>
                            <input type="number" id="p-${i}" value="${p.precio}" class="w-full bg-zinc-800 p-2 rounded-xl text-orange-400 font-mono text-center outline-none">
                        </div>
                        <div class="text-center">
                            <span class="text-[7px] text-zinc-500 font-black block mb-1">STOCK (UDS)</span>
                            <input type="number" id="ac-${i}" value="${p.cant}" class="w-full bg-zinc-800 p-2 rounded-xl text-green-400 font-mono text-center outline-none">
                        </div>
                    </div>
                </div>`;
            });
        }

        function saveAdmin() {
            const ns = store.stock.map((p, i) => ({
                ...p,
                nombre: document.getElementById(`n-${i}`).value,
                precio: parseInt(document.getElementById(`p-${i}`).value) || 0,
                cant: parseInt(document.getElementById(`ac-${i}`).value) || 0
            }));
            db.ref('/v11').update({ base: parseInt(document.getElementById('a-base').value) || 0, stock: ns }).then(() => {
                document.getElementById('m-admin').style.display='none';
            });
        }

        function cerrarOpciones() { document.getElementById('m-opciones').style.display = 'none'; }
    </script>
</body>
</html>
