<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niza POS - Reparado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal.active { display: flex; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-40">

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-6 rounded-b-[40px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic text-yellow-400 uppercase tracking-tighter">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg tap-active">ADMIN ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">CIERRE 📊</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">BASE</span><span id="txt-base" class="text-[10px] text-blue-300 font-bold">$0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">VENTAS</span><span id="txt-ventas" class="text-[10px] text-green-400 font-bold">$0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50">GASTOS</span><span id="txt-gastos" class="text-[10px] text-red-400 font-bold">$0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30"><span class="text-[7px] block opacity-50 text-white">CAJA</span><span id="txt-total" class="text-[10px] font-black text-yellow-300">$0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-5 rounded-[30px] mb-6 border-2 border-slate-800 tap-active">
            <div class="flex items-center gap-4">
                <div id="icon-domi" class="text-3xl grayscale opacity-40">🛵</div>
                <p class="font-black text-xs uppercase italic tracking-widest">¿DOMICILIO? (+$2.000)</p>
            </div>
            <div id="check-ui" class="w-8 h-8 rounded-full border-4 border-slate-700"></div>
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid">
            <p class="text-center col-span-2 py-10 opacity-50 italic animate-pulse">Cargando Menú...</p>
        </div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[35px] p-6 max-h-[85vh] flex flex-col shadow-2xl">
            <h2 class="text-xl font-black mb-4 text-center text-yellow-500 uppercase italic">AJUSTES INICIALES</h2>
            
            <div class="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 mb-4 text-center">
                <p class="text-[9px] font-black text-blue-300 uppercase mb-2">Base de Dinero Hoy</p>
                <input type="number" id="adm-base" class="w-full bg-slate-800 p-3 rounded-xl text-white font-mono text-xl text-center outline-none border border-slate-700 focus:border-blue-500">
            </div>

            <div id="admin-items" class="overflow-y-auto space-y-3 pr-1 flex-1">
                </div>

            <div class="mt-6 flex gap-2">
                <button onclick="cerrar()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-[10px] uppercase text-slate-400">SALIR</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-green-900/30">GUARDAR TODO ✅</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[35px] p-8 text-center shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-red-500 uppercase italic">REGISTRAR GASTO</h2>
            <p class="text-[10px] font-black opacity-50 uppercase mb-2">Valor en Números</p>
            <input type="number" id="m-gasto" class="w-full bg-slate-800 p-4 rounded-xl mb-8 text-white text-3xl font-mono text-center outline-none border border-slate-700 focus:border-red-500">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase text-sm shadow-lg">GUARDAR SALIDA</button>
            <button onclick="cerrar()" class="w-full mt-4 text-slate-500 text-[10px] font-black uppercase">CANCELAR</button>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[40px] p-6 flex justify-between items-center shadow-2xl z-50 border-t-4 border-green-500">
        <div>
            <span class="text-[8px] font-black text-slate-400 uppercase mb-1 block italic">TOTAL PEDIDO</span>
            <span id="total-ticket" class="text-4xl font-black text-slate-900 italic font-mono leading-none">$0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirGasto()" class="bg-red-50 text-red-600 h-16 w-14 rounded-2xl flex items-center justify-center text-2xl tap-active border border-red-100 shadow-sm">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-600 text-white h-16 w-24 rounded-3xl flex items-center justify-center text-4xl shadow-xl tap-active">💰</button>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let appData = null; let tempTotal = 0; let esDomi = false;

        // FUNCIÓN CLAVE: REPARACIÓN AUTOMÁTICA SI NO HAY PRODUCTOS
        database.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.stock || data.stock.length === 0) {
                console.log("Reparando base de datos...");
                initDB(); 
            } else {
                appData = data;
                render();
            }
        }, (error) => {
            console.error("Error de Firebase:", error);
            alert("Error de conexión. Reintenta.");
        });

        function initDB() {
            const menuInicial = [
                { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 10, icon: "🥟" },
                { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 10, icon: "🧀" },
                { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 10, icon: "🌽" },
                { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 10, icon: "🍍" },
                { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 10, icon: "🍖" },
                { id: 6, nombre: "Pinchos", precio: 8000, cant: 10, icon: "🍢" },
                { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 10, icon: "🍓" },
                { id: 8, nombre: "Limonada", precio: 1000, cant: 10, icon: "🥤" }
            ];
            database.ref('/').set({ base: 0, ventas: 0, gastos: 0, stock: menuInicial });
        }

        function render() {
            const grid = document.getElementById('menu-grid');
            if(!grid) return;
            grid.innerHTML = '';
            appData.stock.forEach(p => {
                grid.innerHTML += `
                    <div onclick="vender(${p.id})" class="bg-slate-900 border border-white/5 p-4 rounded-[25px] tap-active shadow-lg">
                        <div class="text-3xl mb-1">${p.icon}</div>
                        <h3 class="text-[10px] font-black uppercase opacity-60 leading-none mb-1">${p.nombre}</h3>
                        <p class="text-orange-400 font-mono font-bold text-xs">$${p.precio.toLocaleString()}</p>
                        <span class="text-[8px] font-bold opacity-30 uppercase tracking-tighter">Disp: ${p.cant}</span>
                    </div>
                `;
            });
            document.getElementById('txt-base').innerText = `$${appData.base.toLocaleString()}`;
            document.getElementById('txt-ventas').innerText = `$${appData.ventas.toLocaleString()}`;
            document.getElementById('txt-gastos').innerText = `$${appData.gastos.toLocaleString()}`;
            document.getElementById('txt-total').innerText = `$${(appData.base + appData.ventas - appData.gastos).toLocaleString()}`;
        }

        function abrirAdmin() {
            const cont = document.getElementById('admin-items');
            document.getElementById('adm-base').value = appData.base;
            cont.innerHTML = '';
            appData.stock.forEach((p, i) => {
                cont.innerHTML += `
                    <div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5 shadow-inner">
                        <div class="flex gap-2 items-center mb-3">
                            <span class="text-xl">${p.icon}</span>
                            <input type="text" id="adm-nom-${i}" value="${p.nombre}" class="bg-transparent border-b border-white/10 text-[10px] font-black w-full uppercase outline-none text-yellow-400">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[7px] opacity-40 uppercase font-black mb-1">Precio $</p>
                                 <input type="number" id="adm-pre-${i}" value="${p.precio}" class="w-full bg-slate-950 p-3 rounded-xl text-xs font-mono text-orange-400 text-center border border-slate-700"></div>
                            <div><p class="text-[7px] opacity-40 uppercase font-black mb-1">Stock Actual</p>
                                 <input type="number" id="adm-can-${i}" value="${p.cant}" class="w-full bg-slate-950 p-3 rounded-xl text-xs font-mono text-green-400 text-center border border-slate-700"></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('modal-admin').classList.add('active');
        }

        function guardarAdmin() {
            const b = parseInt(document.getElementById('adm-base').value) || 0;
            const nuevoStock = appData.stock.map((p, i) => ({
                id: p.id, icon: p.icon,
                nombre: document.getElementById(`adm-nom-${i}`).value,
                precio: parseInt(document.getElementById(`adm-pre-${i}`).value) || 0,
                cant: parseInt(document.getElementById(`adm-can-${i}`).value) || 0
            }));
            database.ref('/').update({ base: b, stock: nuevoStock })
                .then(() => { cerrar(); alert("✅ Configuración Guardada"); })
                .catch((e) => alert("Error al guardar: " + e.message));
        }

        function vender(id) {
            let p = appData.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("⚠️ AGOTADO");
            tempTotal += p.precio;
            p.cant--;
            document.getElementById('total-ticket').innerText = `$${tempTotal.toLocaleString()}`;
        }

        function finalizarVenta() {
            if(tempTotal === 0) return;
            let final = tempTotal + (esDomi ? 2000 : 0);
            database.ref('/').update({ ventas: appData.ventas + final, stock: appData.stock })
                .then(() => {
                    tempTotal = 0; if(esDomi) toggleDomi();
                    document.getElementById('total-ticket').innerText = `$0`;
                    alert("✅ Venta Exitosa");
                });
        }

        function toggleDomi() {
            esDomi = !esDomi;
            const ui = document.getElementById('btn-domi-ui');
            const check = document.getElementById('check-ui');
            if(esDomi) { ui.classList.add('bg-orange-500/10', 'border-orange-400'); check.classList.add('bg-orange-500'); }
            else { ui.classList.remove('bg-orange-500/10', 'border-orange-400'); check.classList.remove('bg-orange-500'); }
        }

        function abrirGasto() { document.getElementById('modal-gasto').classList.add('active'); }
        function guardarGasto() {
            const v = parseInt(document.getElementById('m-gasto').value);
            if(!v) return;
            database.ref('/').update({ gastos: appData.gastos + v }).then(() => { cerrar(); document.getElementById('m-gasto').value = ''; });
        }

        function verReporte() {
            const n = appData.base + appData.ventas - appData.gastos;
            alert(`📝 RESUMEN NIZA\nBase: $${appData.base.toLocaleString()}\nVentas: $${appData.ventas.toLocaleString()}\nGastos: $${appData.gastos.toLocaleString()}\nTotal Caja: $${n.toLocaleString()}`);
            if(confirm("¿Deseas resetear las VENTAS y GASTOS hoy?")) {
                database.ref('/').update({ ventas: 0, gastos: 0 });
            }
        }
        function cerrar() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
    </script>
</body>
</html>
