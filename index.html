<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DELICIAS NIZA V21</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; }
        body { background-color: #000; color: white; user-select: none; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Layout Dividido Mejorado */
        .seccion-principal { display: flex; height: calc(100vh - 85px); overflow: hidden; }
        .panel-productos { width: 58%; border-right: 1px solid #333; overflow-y: auto; padding: 8px; background: #050505; }
        .panel-pedido { width: 42%; display: flex; flex-direction: column; background: #0a0a0a; overflow-y: auto; padding: 8px; }

        /* Estilos del Carrito Compacto */
        .item-carrito { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 5px 8px; border-radius: 10px; margin-bottom: 4px; border-left: 3px solid #f97316; }
        
        /* Scrollbar Discreto */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .font-digital { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body>

    <header class="bg-red-800 shadow-2xl z-50 border-b border-yellow-500 h-[85px] flex flex-col justify-center">
        <div class="flex justify-between items-center px-3 mb-1">
            <div class="leading-none">
                <h1 class="font-black italic text-white text-lg uppercase tracking-tighter">DELICIAS NIZA</h1>
                <span class="text-[7px] text-yellow-400 font-bold uppercase tracking-[0.2em]">PRO SYSTEM V21</span>
            </div>
            <div class="flex gap-2">
                <button onclick="verHistorial()" class="bg-black/40 p-2 rounded-full text-sm tap">🕒</button>
                <button onclick="accesoAdmin()" class="bg-black/40 p-2 rounded-full text-sm tap">⚙️</button>
                <button onclick="verRepo()" class="bg-yellow-500 text-black px-2 py-1 rounded font-black text-[9px] tap uppercase">Cierre</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-0.5 px-1">
            <div class="bg-black/50 p-1 text-center border-r border-white/10">
                <p class="text-[6px] text-zinc-400 uppercase font-bold">Ventas</p>
                <p id="v-ventas" class="text-[9px] font-digital text-green-400 font-bold">$ 0</p>
            </div>
            <div class="bg-black/50 p-1 text-center border-r border-white/10">
                <p class="text-[6px] text-zinc-400 uppercase font-bold">Gastos</p>
                <p id="v-gastos" class="text-[9px] font-digital text-red-400 font-bold">$ 0</p>
            </div>
            <div class="bg-orange-600 p-1 text-center shadow-inner">
                <p class="text-[6px] text-white uppercase font-black">En Caja</p>
                <p id="v-total" class="text-[10px] font-digital text-white font-black">$ 0</p>
            </div>
            <div class="bg-black/50 p-1 text-center">
                <p class="text-[6px] text-zinc-400 uppercase font-bold">Base</p>
                <p id="v-base" class="text-[9px] font-digital text-blue-300 font-bold">$ 0</p>
            </div>
        </div>
    </header>

    <div class="seccion-principal">
        
        <div class="panel-productos">
            <input type="text" id="buscador" onkeyup="buscarProducto()" placeholder="🔍 Buscar producto..." class="w-full bg-zinc-900 text-white p-2 rounded-lg border border-zinc-800 outline-none text-[10px] mb-2 sticky top-0 z-50">
            
            <div id="menu" class="grid grid-cols-2 gap-1.5">
                </div>
        </div>

        <div class="panel-pedido">
            <div class="flex justify-between items-center mb-2 border-b border-zinc-800 pb-1">
                <span class="text-[8px] font-black uppercase text-zinc-500">🛒 Carrito</span>
                <span class="text-[8px] text-orange-400 font-bold uppercase">👤 <span id="nombre-atendedor">---</span></span>
            </div>
            
            <div id="lista-carrito" class="flex-1 overflow-y-auto pr-0.5">
                </div>
            
            <div class="border-t border-zinc-800 pt-2 mt-1">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[8px] font-bold text-zinc-400">TOTAL:</span>
                    <span id="t-ped" class="text-3xl font-black font-digital text-white leading-none">$ 0</span>
                </div>
                
                <div class="grid grid-cols-2 gap-1.5">
                    <div class="grid grid-cols-2 gap-1.5">
                        <button onclick="addDomi()" class="bg-zinc-800 text-blue-400 h-9 rounded-lg text-lg tap flex items-center justify-center font-bold border border-zinc-700">🛵</button>
                        <button onclick="abrirGasto()" class="bg-zinc-800 text-red-400 h-9 rounded-lg text-lg tap flex items-center justify-center font-bold border border-zinc-700">💸</button>
                        <button onclick="confirmarLimpiarPedido()" class="col-span-2 bg-zinc-900 text-zinc-500 h-7 rounded-lg text-[7px] font-black uppercase tap border border-zinc-800">Limpiar Todo</button>
                    </div>
                    <button onclick="confirmarMetodoPago()" class="bg-green-600 text-white h-[76px] rounded-xl text-3xl tap flex items-center justify-center font-black shadow-lg border-b-4 border-green-900">💰</button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;">
        <div class="bg-zinc-900 p-6 rounded-[30px] w-full max-w-xs border border-yellow-500 text-center mx-4">
            <h2 class="text-white font-black mb-4 text-sm uppercase italic">¿Quién atiende?</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setUsuario('Nelson')" class="bg-orange-600 py-3 rounded-lg font-black tap uppercase text-white text-xs">Nelson</button>
                <button onclick="setUsuario('Jenny')" class="bg-zinc-800 py-3 rounded-lg font-black tap uppercase text-white text-xs">Jenny</button>
                <button onclick="setUsuario('Juan')" class="bg-zinc-800 py-3 rounded-lg font-black tap uppercase text-white text-xs">Juan</button>
                <button onclick="setUsuario('Elizabeth')" class="bg-zinc-800 py-3 rounded-lg font-black tap uppercase text-white text-xs">Elizabeth</button>
                <button onclick="setUsuario('Valeria')" class="bg-zinc-800 py-3 rounded-lg font-black tap uppercase text-white text-xs">Valeria</button>
                <button onclick="setUsuario('Betty')" class="bg-zinc-800 py-3 rounded-lg font-black tap uppercase text-white text-xs">Betty</button>
            </div>
        </div>
    </div>

    <div id="m-pago" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-[30px] w-full max-w-xs border border-green-500 text-center">
            <h2 class="text-white font-black mb-6 uppercase text-sm">Método de Pago</h2>
            <button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-4 rounded-xl text-lg font-black mb-3 tap text-white">💵 Efectivo</button>
            <button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-4 rounded-xl text-lg font-black tap text-white">📱 Transferencia</button>
            <button onclick="document.getElementById('m-pago').style.display='none'" class="mt-4 text-zinc-500 text-[9px] uppercase">Cancelar</button>
        </div>
    </div>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-5 rounded-[30px] w-full max-w-xs border border-orange-500">
            <h2 id="opt-titulo" class="text-yellow-400 font-black mb-4 uppercase text-center italic">Sabor</h2>
            <div id="opt-container" class="flex flex-col gap-1.5"></div>
            <button onclick="cerrarOpciones()" class="mt-4 text-zinc-600 text-[8px] w-full text-center uppercase font-bold">Cerrar</button>
        </div>
    </div>

    <div id="m-historial" class="modal px-4"><div class="bg-zinc-900 p-4 rounded-2xl w-full max-w-sm max-h-[70vh] flex flex-col border border-zinc-700">
        <h2 class="text-yellow-500 font-black text-center mb-3 uppercase text-xs">Ventas Recientes</h2>
        <div id="h-list" class="overflow-y-auto flex-1 space-y-1 text-[9px]"></div>
        <button onclick="document.getElementById('m-historial').style.display='none'" class="bg-zinc-800 py-2 mt-3 rounded-lg font-black uppercase text-white text-[9px]">Cerrar</button>
    </div></div>

    <div id="m-admin" class="modal px-4"><div class="bg-zinc-900 p-4 rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col border border-zinc-700">
        <h2 class="text-yellow-500 font-black text-center mb-3 uppercase text-xs">Admin Inventario</h2>
        <div id="a-items" class="overflow-y-auto flex-1 pr-1">
            <div class="mb-3 bg-black/40 p-2 rounded-lg text-center">
                <label class="text-[8px] text-zinc-500 font-black uppercase">Base Caja ($)</label>
                <input type="number" id="a-base" class="w-full bg-zinc-800 p-1 rounded text-white text-center font-digital border border-zinc-700">
            </div>
            <div id="a-list" class="space-y-1"></div>
        </div>
        <button onclick="saveAdmin()" class="bg-green-600 py-2 mt-3 rounded-lg font-black uppercase text-white text-[10px]">Guardar ✅</button>
    </div></div>

    <script>
        const CLAVE = "1234";
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedidoTotal = 0, listaCarrito = [], usuarioActual = "---";

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        function setUsuario(n) {
            usuarioActual = n;
            document.getElementById('m-user').style.display = 'none';
            document.getElementById('nombre-atendedor').innerText = n;
            db.ref('/niza_v21').on('value', (snap) => {
                store = snap.val();
                if(!store) {
                    const init = [
                        { id: 1, nombre: "Empanada", precio: 4000, cant: 0, icon: "🥟", sub: [
                            {n: "Carne", c: 20}, {n: "Pollo Queso", c: 20}, {n: "Hawayana", c: 20}, {n: "Mixta Yuca", c: 20}
                        ]},
                        { id: 2, nombre: "Rellena", precio: 7000, cant: 0, icon: "🍖", sub: [{n: "Con Papa", c: 10}, {n: "Con Patacón", c: 10}]},
                        { id: 3, nombre: "Pincho", precio: 8000, cant: 0, icon: "🍢", sub: [{n: "Con Papa", c: 10}, {n: "Con Patacón", c: 10}]},
                        { id: 4, nombre: "Papa Rellena", precio: 4000, cant: 20, icon: "🥔" },
                        { id: 6, nombre: "Churro B&Q", precio: 4000, cant: 20, icon: "🥐" },
                        { id: 7, nombre: "Flauta P&Q", precio: 4000, cant: 20, icon: "🌯" },
                        { id: 8, nombre: "Fresas", precio: 14000, cant: 15, icon: "🍓" },
                        { id: 9, nombre: "Bebida", precio: 1000, cant: 30, icon: "🥤" }
                    ];
                    db.ref('/niza_v21').set({ base: 0, ventas: 0, gastos: 0, stock: init, h_ventas: [], h_gastos: [] });
                } else { draw(); }
            });
        }

        function buscarProducto() { draw(document.getElementById('buscador').value.toLowerCase()); }

        function draw(filtro = "") {
            const m = document
