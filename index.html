<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza - Sistema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-48">

    <header class="bg-gradient-to-b from-red-600 to-red-900 p-6 rounded-b-[50px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/50">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black italic text-yellow-400">DELICIAS NIZA</h1>
                <p class="text-[9px] font-bold opacity-60 tracking-widest uppercase">Panel de Control Cloud</p>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-3 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg tap-active">Admin ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">Cierre 📊</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50">BASE</span><span id="txt-base" class="text-[10px] font-bold text-blue-300">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50">VENTAS</span><span id="txt-ventas" class="text-[10px] font-bold text-green-400">$0</span></div>
            <div class="bg-black/30 p-2 rounded-2xl"><span class="text-[7px] block opacity-50">GASTOS</span><span id="txt-gastos" class="text-[10px] font-bold text-red-400">$0</span></div>
            <div class="bg-orange-500/40 p-2 rounded-2xl border border-orange-400/50"><span class="text-[7px] block opacity-50 text-white">CAJA</span><span id="txt-total" class="text-[10px] font-black text-yellow-300">$0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-4 rounded-[25px] mb-6 border-2 border-slate-800 tap-active">
            <div class="flex items-center gap-3">
                <div id="icon-domi" class="text-2xl grayscale opacity-50">🛵</div>
                <p class="font-black text-[11px] uppercase">¿Es Domicilio? (+$2.000)</p>
            </div>
            <div id="check-ui" class="w-7 h-7 rounded-full border-4 border-slate-700"></div>
        </div>

        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>

        <div class="mt-8">
            <h3 class="text-[10px] font-black uppercase text-slate-500 mb-3 italic">Registro de Hoy</h3>
            <div id="historial-lista" class="space-y-1 bg-slate-900/40 p-3 rounded-3xl"></div>
        </div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[40px] p-6 max-h-[90vh] flex flex-col">
            <h2 class="text-xl font-black mb-1 text-center text-yellow-500 italic uppercase">AJUSTES DE NEGOCIO</h2>
            <p class="text-[9px] text-center opacity-50 mb-6 uppercase tracking-widest">Edita Precios, Nombres y Stock</p>
            
            <div id="admin-items" class="overflow-y-auto space-y-4 pr-1 scroll-hide">
                </div>

            <div class="mt-6 flex gap-3">
                <button onclick="cerrarAdmin()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold text-xs uppercase text-slate-400">Cancelar</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-green-900/30">Guardar Cambios ✅</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[35px] p-8 text-center">
            <h2 class="text-xl font-black mb-6 text-red-500 uppercase">Registrar Gasto</h2>
            <input type="number" id="m-gasto" placeholder="Valor $" class="w-full bg-slate-800 p-4 rounded-xl mb-3 text-white text-xl font-mono text-center outline-none border border-slate-700">
            <input type="text" id="n-gasto" placeholder="¿En qué se gastó?" class="w-full bg-slate-800 p-4 rounded-xl mb-8 text-white text-sm outline-none border border-slate-700">
            <button onclick="guardarG
