<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA V54 - AJUSTES RESTAURADOS</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background-color: #000; color: white; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .niza-header { height: 95px; background: #7f1d1d; border-bottom: 2px solid #fbbf24; padding: 6px 12px; flex-shrink: 0; }
        .niza-main { display: flex; flex: 1; overflow: hidden; background: #000; padding-bottom: 110px; }
        .col-izq { width: 55%; overflow-y: auto; padding: 8px; border-right: 1px solid #27272a; }
        .col-der { width: 45%; overflow-y: auto; padding: 8px; background: #09090b; }
        .niza-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; border-top: 1px solid #3f3f46; z-index: 50; }
        .contenedor-botones { display: grid; grid-template-columns: 0.8fr 0.8fr 0.8fr 0.8fr 2.2fr; gap: 6px; padding: 10px; }
        .btn-tool { background: #27272a; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 52px; border: 1px solid #52525b; }
        .btn-tool b { font-size: 8px; color: #fff; text-transform: uppercase; margin-top: 2px; }
        .btn-pay { background: #15803d; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; height: 52px; border-bottom: 3px solid #14532d; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .item-cart { display: flex; justify-content: space-between; align-items: center; background: #18181b; padding: 8px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid #f97316; }
    </style>
</head>
<body>

    <header class="niza-header">
        <div class="flex justify-between items-center mb-1.5">
            <div class="flex items-center gap-2">
                <h1 class="font-black italic text-xs text-yellow-400">NIZA V54</h1>
                <span id="label-u" class="bg-white/10 px-2 py-0.5 rounded text-[8px] text-zinc-300 uppercase font-bold"></span>
            </div>
            <div class="flex gap-1">
                <button onclick="abrirAdmin()" class="bg-zinc-700 px-2 py-1 rounded text-[10px] tap">⚙️</button>
                <button onclick="cierreDia()" class="bg-red-600 px-2 py-1 rounded text-[8px] font-black tap text-white">CIERRE</button>
                <button onclick="abrirReportes()" class="bg-blue-600 px-2 py-1 rounded text-[10px] tap text-white">📊</button>
                <button onclick="location.reload()" class="bg-zinc-800 px-2 py-1 rounded text-[10px] tap">🔄</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-center">
            <div class="bg-black/40 rounded py-1"><span class="block text-[6px] text-zinc-400 uppercase font-bold">Base</span><span id="v-base" class="text-blue-400 text-[10px] font-black">$ 0</span></div>
            <div class="bg-black/40 rounded py-1"><span class="block text-[6px] text-zinc-400 uppercase font-bold">Ventas</span><span id="v-ventas" class="text-green-400 text-[10px] font-black">$ 0</span></div>
            <div class="bg-black/40 rounded py-1"><span class="block text-[6px] text-zinc-400 uppercase font-bold">Gastos</span><span id="v-gastos" class="text-red-400 text-[10px] font-black">$ 0</span></div>
            <div class="bg-orange-600 rounded py-1"><span class="block text-[6px] text-orange-100 uppercase font-bold">Caja</span><span id="v-total" class="text-white text-[10px] font-black">$ 0</span></div>
        </div>
    </header>

    <div class="niza-main">
        <div class="col-izq">
            <input type="text" id="buscador" oninput="buscar()" placeholder="🔍 Buscar producto..." class="w-full bg-zinc-900 text-white p-3 rounded-xl mb-3 border border-zinc-700 text-sm outline-none">
            <div id="menu" class="grid grid-cols-2 gap-2"></div>
        </div>
        <div class="col-der"><div id="lista-carrito"></div></div>
    </div>

    <footer class="niza-footer">
        <div class="contenedor-botones">
            <button onclick="vaciarCarrito()" class="btn-tool text-red-500 tap"><span>🗑️</span><b>Borrar</b></button>
            <button onclick="addDomi()" class="btn-tool text-blue-400 tap"><span>🛵</span><b>Domi</b></button>
            <button onclick="aplicarDescuento()" class="btn-tool text-orange-400 tap"><span>🏷️</span><b>Desc</b></button>
            <button onclick="abrirGasto()" class="btn-tool text-red-400 tap"><span>💸</span><b>Gasto</b></button>
            <button onclick="irAPagar()" class="btn-pay tap"><div class="text-right"><p class="text-[8px] font-black uppercase">Pagar</p><p id="t-ped" class="text-lg font-black">$ 0</p></div><span>💰</span></button>
        </div>
    </footer>

    <div id="m-admin" class="modal">
        <div class="bg-zinc-900 p-5 rounded-3xl w-full max-w-md h-[85vh] overflow-y-auto border border-zinc-500">
            <h2 class="text-white font-black mb-4 uppercase text-center italic">Ajustes de Inventario</h2>
            <div id="lista-admin" class="space-y-3"></div>
            <button onclick="cerrarModales()" class="w-full bg-zinc-800 py-4 rounded-xl mt-6 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-reportes" class="modal">
        <div class="bg-zinc-900 p-5 rounded-3xl w-full max-w-md h-[85vh] overflow-y-auto border border-blue-500">
            <h2 class="text-blue-400 font-black mb-4 uppercase text-center italic">Hoy</h2>
            <div class="flex gap-2 mb-4">
                <button onclick="exportarExcelHoy()" class="flex-1 bg-green-700 py-3 rounded-xl font-black text-[9px] uppercase text-white">📥 Excel Hoy</button>
                <button onclick="verHistorial()" class="flex-1 bg-purple-700 py-3 rounded-xl font-black text-[9px] uppercase text-white">📜 Ver Pasados</button>
            </div>
            <div id="lista-reporte" class="space-y-2"></div>
            <button onclick="cerrarModales()" class="w-full bg-zinc-800 py-4 rounded-xl mt-4 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-historial" class="modal">
        <div class="bg-zinc-900 p-5 rounded-3xl w-full max-w-md h-[85vh] overflow-y-auto border border-purple-500">
            <h2 class="text-purple-400 font-black mb-4 uppercase text-center italic">Cierres Guardados</h2>
            <div id="lista-historial" class="space-y-3"></div>
            <button onclick="document.getElementById('m-historial').style.display='none'" class="w-full bg-zinc-800 py-4 rounded-xl mt-4 font-bold uppercase text-[10px]">Cerrar</button>
        </div>
    </div>

    <div id="m-detalle-cierre" class="modal">
        <div class="bg-black p-5 rounded-3xl w-full max-w-md h-[85vh] overflow-y-auto border border-yellow-500">
            <h2 id="det-fecha" class="text-yellow-500 font-black mb-2 uppercase text-center text-xs"></h2>
            <p id="det-meta" class="text-[9px] text-zinc-500 text-center mb-4 uppercase"></p>
            <button id="btn-excel-pasado" class="w-full bg-green-700 py-3 rounded-xl mb-4 font-black text-[9px] uppercase text-white tap">📥 Descargar este día (Excel)</button>
            <div id="det-items" class="space-y-1.5"></div>
            <button onclick="document.getElementById('m-detalle-cierre').style.display='none'" class="w-full bg-zinc-800 py-4 rounded-xl mt-4 font-bold uppercase text-[10px]">Cerrar Detalle</button>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-yellow-500 text-center"><h2 class="text-white font-black mb-4 uppercase text-xs italic text-yellow-500">¿Quién atiende?</h2><div class="grid grid-cols-2 gap-2" id="user-btns"></div></div></div>
    <div id="m-pago" class="modal"><div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-xs border border-green-600 text-center text-white"><h2 class="font-black mb-6 uppercase">Método de Pago</h2><button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-5 rounded-2xl text-xl font-black mb-4 tap">💵 EFECTIVO</button><button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-5 rounded-2xl text-xl font-black tap">📱 TRANSF.</button><button onclick="cerrarModales()" class="mt-4 text-zinc-500 text-xs">← Volver</button></div></div>
    <div id="m-opciones" class="modal"><div class="bg-zinc-900 p-5 rounded-2xl w-72 border border-orange-500"><h2 id="opt-t" class="text-yellow-400 font-black mb-4 uppercase text-center text-xs"></h2><div id="opt-c" class="flex flex-col gap-2"></div><button onclick="cerrarModales()" class="mt-4 text-zinc-600 text-[10px] w-full text-center">Volver</button></div></div>

    <script>
        const cfg = { apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs", authDomain: "delicias--niza.firebaseapp.com", databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com", projectId: "delicias--niza" };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedTot = 0, descAct = 0, carrito = [], uAct = "---", tempP = null, cierresCache = {};

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        function getColTime() { const ahora = new Date(); return { fecha: ahora.toLocaleDateString('en-CA', { timeZone: 'America/Bogota' }), hora: ahora.toLocaleTimeString('es-CO', { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', hour12: false }) }; }

        const users = ['Nelson', 'Jenny', 'Juan', 'Elizabeth', 'Valeria', 'Betty'];
        const uDiv = document.getElementById('user-btns');
        users.forEach(u => { uDiv.innerHTML += `<button onclick="setU('${u}')" class="bg-zinc-800 py-3 rounded-lg font-bold tap text-[10px] text-white uppercase">${u}</button>`; });

        function setU(n) { uAct = n; document.getElementById('label-u').innerText = n; document.getElementById('m-user').style.display = 'none'; db.ref('/niza_v31_rep').on('value', (snap) => { store = snap.val(); if(store) draw(); }); }

        function draw(filtro = "") {
            const m = document.getElementById('menu'); m.innerHTML = '';
            if(!store || !store.stock) return;
            store.stock.forEach(p => {
                if(filtro && !p.nombre.toLowerCase().includes(filtro.toLowerCase())) return;
                m.innerHTML += `<div onclick="abrirOpt(${p.id})" class="bg-zinc-900 p-2 rounded-xl tap text-center border border-white/5"><div class="text-xl">${p.icon}</div><div class="text-[9px] font-black uppercase text-zinc-400">${p.nombre}</div><div class="text-orange-500 font-bold text-[10px]">$ ${f(p.precio)}</div></div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
            actualizarTotal();
        }

        function buscar() { draw(document.getElementById('buscador').value); }

        // LOGICA DE ADMINISTRACIÓN (EDITAR PRECIO/STOCK)
        function abrirAdmin() {
            if(prompt("CLAVE ADMIN:") !== "1234") return;
            document.getElementById('m-admin').style.display = 'flex';
            const list = document.getElementById('lista-admin');
            list.innerHTML = `<button onclick="editBase()" class="w-full bg-blue-900/40 p-4 rounded-xl text-blue-400 font-black text-[10px] uppercase border border-blue-500 mb-4">💰 EDITAR BASE CAJA ($${f(store.base)})</button>`;
            store.stock.forEach((p, idx) => {
                list.innerHTML += `
                <div class="bg-zinc-800 p-3 rounded-2xl flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase">${p.nombre}</span>
                    <div class="flex gap-2">
                        <button onclick="editP(${idx})" class="bg-orange-600 px-3 py-2 rounded-lg text-[9px] font-bold">$ ${f(p.precio)}</button>
                        <button onclick="editC(${idx})" class="bg-zinc-600 px-3 py-2 rounded-lg text-[9px] font-bold">📦 ${p.cant || 0}</button>
                    </div>
                </div>`;
            });
        }

        function editBase() { const n = parseInt(prompt("Nueva Base $:", store.base)); if(!isNaN(n)) db.ref('/niza_v31_rep').update({ base: n }); }
        function editP(i) { const n = parseInt(prompt("Nuevo Precio $:", store.stock[i].precio)); if(!isNaN(n)) { store.stock[i].precio = n; db.ref('/niza_v31_rep').update({ stock: store.stock }); } }
        function editC(i) { const n = parseInt(prompt("Nueva Cantidad:", store.stock[i].cant)); if(!isNaN(n)) { store.stock[i].cant = n; db.ref('/niza_v31_rep').update({ stock: store.stock }); } }

        // FUNCIONES DE CIERRE Y REPORTES
        function cierreDia() {
            if(prompt("CLAVE CIERRE:") === "1234" && confirm("¿Cerrar día?")) {
                const { fecha, hora } = getColTime();
                const dataCierre = { fecha, hora, u: uAct, b: store.base || 0, v: store.ventas || 0, g: store.gastos || 0, tot: (store.base || 0) + (store.ventas || 0) - (store.gastos || 0), items: store.h_v || [], gastos_det: store.h_g || [] };
                db.ref('/historico_cierres').push(dataCierre).then(() => { db.ref('/niza_v31_rep').update({ ventas: 0, gastos: 0, h_v: [], h_g: [] }).then(() => location.reload()); });
            }
        }

        function verHistorial() {
            document.getElementById('m-historial').style.display = 'flex';
            const list = document.getElementById('lista-historial');
            list.innerHTML = '<p class="text-center text-zinc-500 text-[10px]">Cargando...</p>';
            db.ref('/historico_cierres').limitToLast(20).once('value', (snap) => {
                list.innerHTML = ''; cierresCache = snap.val() || {};
                Object.keys(cierresCache).reverse().forEach(id => {
                    const c = cierresCache[id];
                    list.innerHTML += `
                        <div class="bg-zinc-800 p-3 rounded-2xl border-l-4 border-purple-500">
                            <div class="flex justify-between items-center mb-2"><span class="text-white font-black text-[10px]">${c.fecha}</span><span class="text-zinc-500 text-[8px] uppercase">${c.u}</span></div>
                            <div class="grid grid-cols-3 gap-1 text-center mb-3">
                                <div><p class="text-[7px] text-zinc-500 uppercase font-bold">Venta</p><p class="text-green-400 text-[9px] font-black">$${f(c.v)}</p></div>
                                <div><p class="text-[7px] text-zinc-500 uppercase font-bold">Gasto</p><p class="text-red-400 text-[9px] font-black">-$${f(c.g)}</p></div>
                                <div><p class="text-[7px] text-zinc-500 uppercase font-bold">Caja</p><p class="text-white text-[9px] font-black">$${f(c.tot)}</p></div>
                            </div>
                            <button onclick="verDetalleCierre('${id}')" class="w-full bg-purple-600/20 py-2 rounded-lg text-purple-400 text-[9px] font-black uppercase tap">Ver Detalle / Excel</button>
                        </div>`;
                });
            });
        }

        function verDetalleCierre(id) {
            const c = cierresCache[id];
            document.getElementById('m-detalle-cierre').style.display = 'flex';
            document.getElementById('det-fecha').innerText = `DÍA: ${c.fecha}`;
            document.getElementById('det-meta').innerText = `HORA: ${c.hora} | VENDEDOR: ${c.u}`;
            document.getElementById('btn-excel-pasado').onclick = () => exportarCierrePasado(id);
            const list = document.getElementById('det-items');
            list.innerHTML = '';
            if(c.items) c.items.forEach(i => { list.innerHTML += `<div class="bg-zinc-900 p-2 rounded flex justify-between text-[9px] border-b border-white/5"><span>${i.t} <b>${i.n}</b></span><span class="text-green-500 font-black">$${f(i.v)}</span></div>`; });
            if(c.gastos_det) c.gastos_det.forEach(g => { list.innerHTML += `<div class="bg-red-900/10 p-2 rounded flex justify-between text-[9px] italic"><span>${g.t} - ${g.d}</span><span class="text-red-400">-$${f(g.v)}</span></div>`; });
        }

        function exportarCierrePasado(id) {
            const c = cierresCache[id];
            const data = (c.items || []).map(v => ({ Fecha: v.fecha, Hora: v.t, Producto: v.n, Valor: v.v, Vendedor: v.u, Pago: v.m }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ventas");
            XLSX.writeFile(wb, `NIZA_Ventas_${c.fecha}.xlsx`);
        }

        function exportarExcelHoy() {
            const data = (store.h_v || []).map(v => ({ Fecha: v.fecha, Hora: v.t, Producto: v.n, Valor: v.v, Vendedor: v.u, Pago: v.m }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Hoy");
            XLSX.writeFile(wb, `NIZA_HOY_${getColTime().fecha}.xlsx`);
        }

        function abrirReportes() {
            document.getElementById('m-reportes').style.display = 'flex';
            const list = document.getElementById('lista-reporte'); list.innerHTML = '';
            const all = [...(store.h_v || []), ...(store.h_g || []).map(g => ({...g, isGasto: true}))].sort((a,b) => b.t.localeCompare(a.t));
            all.forEach(x => {
                if(x.isGasto) list.innerHTML += `<div class="bg-red-900/10 p-2 rounded border-l-4 border-red-600 text-[9px] mb-1"><div class="flex justify-between font-black"><span>${x.t} - GASTO: ${x.d}</span><span class="text-red-400">-$${f(x.v)}</span></div></div>`;
                else list.innerHTML += `<div class="bg-zinc-800 p-2 rounded border-l-4 border-green-600 text-[9px] mb-1"><div class="flex justify-between font-black"><span>${x.t} - ${x.n} (${x.m})</span><span class="text-green-400">$${f(x.v)}</span></div></div>`;
            });
        }

        function doCobro(met) {
            const { fecha, hora } = getColTime();
            const h = store.h_v || [];
            carrito.forEach(i => {
                h.push({ n: i.n, v: i.v, u: uAct, t: hora, fecha, m: met, pid: i.id });
                let p = store.stock.find(x => x.id === i.id);
                if(p) { if(i.si !== null && p.sub) p.sub[i.si].c--; else p.cant--; }
            });
            if(descAct > 0) h.push({ n: "DESCUENTO", v: -descAct, u: uAct, t: hora, fecha, m: met });
            db.ref('/niza_v31_rep').update({ ventas: store.ventas + pedTot, stock: store.stock, h_v: h }).then(() => {
                cerrarModales(); carrito = []; descAct = 0; actualizarTotal();
            });
        }

        function actualizarTotal() {
            pedTot = carrito.reduce((a, x) => a + x.v, 0) - descAct;
            document.getElementById('t-ped').innerText = "$ " + f(pedTot);
            const c = document.getElementById('lista-carrito'); c.innerHTML = '';
            carrito.forEach((item, i) => { c.innerHTML += `<div class="item-cart"><div><p class="text-[9px] font-black uppercase text-white">${item.n}</p><p class="text-[8px] text-orange-400 font-bold">$ ${f(item.v)}</p></div><button onclick="quitarI(${i})" class="bg-red-600/30 text-white w-6 h-6 rounded-full text-[10px]">✕</button></div>`; });
            if(descAct > 0) c.innerHTML += `<div class="item-cart bg-red-900/40"><div><p class="text-[9px] font-black text-red-100">DESC.</p><p class="text-[8px] text-red-200">-$ ${f(descAct)}</p></div></div>`;
        }

        function abrirOpt(id) { 
            let p = store.stock.find(x => x.id === id); 
            if(p.sub) { 
                tempP = p; document.getElementById('opt-t').innerText = p.nombre; const c = document.getElementById('opt-c'); c.innerHTML = ''; 
                p.sub.forEach((s, i) => { c.innerHTML += `<button onclick="sumarFinal(${i})" class="bg-zinc-800 py-4 rounded-xl text-xs font-black tap flex justify-between px-4 text-white"><span>${s.n}</span> <span class="text-green-500">${s.c}</span></button>`; }); 
                document.getElementById('m-opciones').style.display = 'flex'; 
            } else { addCarrito(p.id, p.nombre, p.precio, null); } 
        }
        function sumarFinal(i) { let sO = tempP.sub[i]; let ex = (sO.n === 'Con Patacón') ? 1000 : 0; addCarrito(tempP.id, `${tempP.nombre} (${sO.n})`, tempP.precio + ex, i); cerrarModales(); }
        function addCarrito(id, n, v, si) { carrito.push({ id, n, v, si }); actualizarTotal(); }
        function quitarI(i) { carrito.splice(i, 1); if(carrito.length===0) descAct=0; actualizarTotal(); }
        function vaciarCarrito() { if(confirm("¿Vaciar?")) { carrito = []; descAct = 0; actualizarTotal(); } }
        function irAPagar() { if(carrito.length > 0) document.getElementById('m-pago').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function addDomi() { const v = parseInt(prompt("Valor domicilio $:")); if(v) { carrito.push({ id: 99, n: "Domicilio", v: v, si: null }); actualizarTotal(); } }
        function aplicarDescuento() { if(carrito.length > 0) { const v = parseInt(prompt("Descuento $:")); if(v > 0) { descAct = v; actualizarTotal(); } } }
        function abrirGasto() { const v = parseInt(prompt("Valor $:")); const d = prompt("Concepto:"); if(v && d) { const { fecha, hora } = getColTime(); const h = store.h_g || []; h.push({ v, d, u: uAct, t: hora, fecha }); db.ref('/niza_v31_rep').update({ gastos: (store.gastos || 0) + v, h_g: h }); } }
    </script>
</body>
</html>
