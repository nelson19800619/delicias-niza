<!DOCTYPE html>
<html lang="es">
<head>

<body class="bg-slate-950 text-white font-sans pb-44">

    <header class="bg-gradient-to-b from-red-800 to-red-950 p-5 rounded-b-[40px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">

            <h1 class="text-lg font-black italic text-yellow-400 uppercase tracking-tighter">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-3 py-2 rounded-xl text-[10px] font-black uppercase tap-active">ADMIN ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">CIERRE 📊</button>

        </div>
        <div class="grid grid-cols-4 gap-1 text-center font-mono">

            <div class="bg-black/30 p-2 rounded-xl text-green-400"><span class="text-[7px] block opacity-50 text-white uppercase">Ventas</span><span id="txt-ventas" class="text-[9px] font-bold">$ 0</span></div>
            <div class="bg-black/30 p-2 rounded-xl text-red-400"><span class="text-[7px] block opacity-50 text-white uppercase">Gastos</span><span id="txt-gastos" class="text-[9px] font-bold">$ 0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30 text-yellow-300 font-black"><span id="txt-total" class="text-[10px]">$ 0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div class="grid grid-cols-2 gap-3" id="menu-grid">
            <div class="col-span-2 text-center py-20">
                <p class="animate-pulse text-orange-500 font-black uppercase tracking-widest text-xs">Conectando con Niza...</p>
            </div>
        </div>
    </main>
