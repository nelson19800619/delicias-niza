<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza Pro - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-48">

    <header class="bg-gradient-to-b from-red-700 to-red-900 p-6 rounded-b-[50px] sticky top-0 z-40 shadow-2xl border-b border-white/10">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-yellow-400 uppercase">DELICIAS NIZA</h1>
                <p id="reloj" class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Sincronizado</p>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirBase()" class="bg-white/10 px-3 py-2 rounded-xl text-[10px] font-bold border border-white/20 uppercase">💰 Base</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase">📊 Cierre</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center">
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase">Base</span>
                <span id="txt-base" class="text-xs font-bold text-blue-300">$0</span>
            </div>
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase">Ventas</span>
                <span id="txt-ventas" class="text-xs font-bold text-green-400">$0</span>
            </div>
            <div class="bg-black/30 p-2 rounded-2xl">
                <span class="text-[8px] block opacity-50 uppercase">Gastos</span>
                <span id="txt-gastos" class="text-xs font-bold text-red-400">$0</span>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-2xl border border-orange-500/30">
                <span class="text-[8px] block opacity-50 uppercase">En Caja</span>
                <span id="txt-total" class="text-xs font-black text-yellow-400 font-mono">$0</span>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
