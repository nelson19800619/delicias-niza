<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delicias Niza - POS Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.96); opacity: 0.8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .bg-glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans pb-40">

    <header class="bg-gradient-to-br from-orange-600 via-red-600 to-red-800 p-6 rounded-b-[45px] shadow-2xl sticky top-0 z-40 border-b-2 border-orange-400/30">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter">DELICIAS NIZA</h1>
                <div class="flex items-center gap-1 opacity-80">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <p class="text-[10px] font-bold uppercase tracking-widest">En Línea - Cloud</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirGastos()" class="bg-white/10 p-3 rounded-2xl tap-active text-[10px] font-black uppercase">💸 Gasto</button>
                <button onclick="verReporte()" class="bg-black/40 p-3 rounded-2xl tap-active text-[10px] font-black uppercase tracking-tighter">📊 Reporte</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div class="bg-black/20 p-3 rounded-2xl text-center">
                <span class="text-[8px] block opacity-60 uppercase font-black">Ventas</span>
                <span id="caja-hoy" class="text-sm font-black text-green-400">$0</span>
            </div>
            <div class="bg-black/20 p-3 rounded-2xl text-center">
                <span class="text-[8px] block opacity-60 uppercase font-black">Gastos</span>
                <span id="gastos-hoy" class="text-sm font-black text-red-400">$0</span>
            </div>
            <div class="bg-black/20 p-3 rounded-2xl text-center">
                <span class="text-[8px] block opacity-60 uppercase font-black">Utilidad</span>
                <span id="utilidad-hoy" class="text-sm font-black text-yellow-300">$0</span>
            </div>
        </div>
    </header>

    <main class="p-4 grid grid-cols-2 gap-3 max-w-xl mx-auto" id="menu-grid"></main>

    <div id="modal-gastos" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full rounded-[40px] p-8">
            <h2 class="text-xl font-black mb-4 text-center">REGISTRAR GASTO 💸</h2>
            <input type="number" id="monto-gasto" placeholder="Monto $" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 text-white text-xl font-mono outline-none border border-slate-600">
            <input type="text" id="nota-gasto" placeholder="¿En qué?" class="w-full bg-slate-800 p-4 rounded-2xl mb-6 text-white outline-none border border-slate-600">
            <button onclick="guardarGasto()" class="w-full bg-red-600 py-4 rounded-2xl font-black tap-active shadow-lg">GUARDAR</button>
            <button onclick="cerrarGastos()" class="w-full mt-4 text-slate-500 font-bold text-xs uppercase">CANCELAR</button>
        </div>
    </div>

    <div id="modal-extra" class="modal px-6">
        <div class="bg-white text-slate-900 w-full rounded-[45px] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-center mb-6 italic">ACOMPAÑANTE</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="venderConExtra(0)" class="bg-amber-100 border-b-8 border-amber-500 p-6 rounded-3xl tap-active font-black text-amber-900 text-xl text-left italic">🥔 CON PAPA</button>
                <button onclick="venderConExtra(1000)" class="bg-emerald-100 border-b-8 border-emerald-500 p-6 rounded-3xl tap-active font-black text-emerald-900 text-xl text-left italic">🍌 CON PATACÓN</button>
            </div>
            <button onclick="cerrarModalExtra()" class="w-full mt-8 text-slate-400 font-black uppercase text-xs">VOLVER AL MENÚ</button>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[40px] p-6 flex justify-between items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)] z-50">
        <div>
            <span class="text-[9px] block font-black text-slate-400 uppercase tracking-widest">Total Orden</span>
            <span id="total-ticket" class="text-4xl font-black italic text-slate-900 font-mono leading-none">$0</span>
        </div>
        <button onclick="finalizarVenta()" class="bg-green-500 text-white h-16 w-16 rounded-3xl flex items-center justify-center text-3xl shadow-lg shadow-green-200 tap-active">💰</button>
    </footer>

    <script>
        // CONFIGURACIÓN FIREBASE (Tus Credenciales de Delicias Niza)
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let localStock = [];
        let ventasTotal = 0;
        let gastosTotal = 0;
        let tempTotal = 0;
        let pActivo = null;

        // --- INICIALIZAR BASE DE DATOS (Si está vacía) ---
        function initDB() {
            database.ref('/').once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    database.ref('/').set({
                        stock: [
                            { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 4, icon: "🥟", extra: false },
                            { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 4, icon: "🧀", extra: false },
                            { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 4, icon: "🌽", extra: false },
                            { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 4, icon: "🍍", extra: false },
                            { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 5, icon: "🍖", extra: true },
                            { id: 6, nombre: "Pinchos", precio: 8000, cant: 15, icon: "🍢", extra: true },
                            { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 30, icon: "🍓", extra: false },
                            { id: 8, nombre: "Limonada", precio: 1000, cant: 50, icon: "🥤", extra: false }
                        ],
                        ventasTotal: 0,
                        gastosTotal: 0
                    });
                }
            });
        }

        // --- ESCUCHAR CAMBIOS EN TIEMPO REAL ---
        database.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                localStock = data.stock;
                ventasTotal = data.ventasTotal;
                gastosTotal = data.gastosTotal;
                render();
            }
        });

        function render() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            localStock.forEach(p => {
                const isLow = p.cant < 5;
                grid.innerHTML += `
                    <div onclick="clickProd(${p.id})" class="bg-glass p-4 rounded-[35px] tap-active border-2 ${isLow ? 'border-red-500' : 'border-white/5'}">
                        <div class="text-4xl mb-2">${p.icon}</div>
                        <h3 class="text-[10px] font-black uppercase opacity-80 leading-none">${p.nombre}</h3>
                        <p class="text-orange-400 font-mono font-bold">$${p.precio.toLocaleString()}</p>
                        <div class="mt-2 text-[8px] font-black uppercase ${isLow ? 'text-red-400' : 'text-slate-500'} italic">STOCK: ${p.cant}</div>
                    </div>
                `;
            });
            
            document.getElementById('caja-hoy').innerText = `$${ventasTotal.toLocaleString()}`;
            document.getElementById('gastos-hoy').innerText = `$${gastosTotal.toLocaleString()}`;
            document.getElementById('utilidad-hoy').innerText = `$${(ventasTotal - gastosTotal).toLocaleString()}`;
        }

        function clickProd(id) {
            pActivo = localStock.find(x => x.id === id);
            if(pActivo.cant <= 0) return alert("❌ AGOTADO EN INVENTARIO");
            if(pActivo.extra) document.getElementById('modal-extra').classList.add('active');
            else procesarItem(0);
        }

        function venderConExtra(extra) {
            procesarItem(extra);
            cerrarModalExtra();
        }

        function procesarItem(extra) {
            tempTotal += (pActivo.precio + extra);
            pActivo.cant--;
            document.getElementById('total-ticket').innerText = `$${tempTotal.toLocaleString()}`;
            // Actualizar stock en la nube de inmediato
            database.ref('stock').set(localStock);
            render();
        }

        function finalizarVenta() {
            if(tempTotal === 0) return;
            const nuevoTotalVentas = ventasTotal + tempTotal;
            database.ref('ventasTotal').set(nuevoTotalVentas);
            tempTotal = 0;
            document.getElementById('total-ticket').innerText = `$0`;
            alert("✨ VENTA GUARDADA EN LA NUBE");
        }

        function guardarGasto() {
            const m = parseInt(document.getElementById('monto-gasto').value);
            if(!m) return;
            database.ref('gastosTotal').set(gastosTotal + m);
            document.getElementById('monto-gasto').value = '';
            cerrarGastos();
        }

        function verReporte() {
            alert(`📝 DELICIAS NIZA - CIERRE\n------------------\nVentas: $${ventasTotal.toLocaleString()}\nGastos: $${gastosTotal.toLocaleString()}\nNETO: $${(ventasTotal - gastosTotal).toLocaleString()}`);
            if(confirm("¿Reiniciar caja para nuevo día?")) {
                database.ref('ventasTotal').set(0);
                database.ref('gastosTotal').set(0);
            }
        }

        function abrirGastos() { document.getElementById('modal-gastos').classList.add('active'); }
        function cerrarGastos() { document.getElementById('modal-gastos').classList.remove('active'); }
        function cerrarModalExtra() { document.getElementById('modal-extra').classList.remove('active'); }

        initDB();
    </script>
</body>
</html>
