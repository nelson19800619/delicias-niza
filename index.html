<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA V43 FINAL-LOCK</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.96); opacity: 0.8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; color: white; font-family: system-ui, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .niza-header { 
            height: 85px; background: #7f1d1d; border-bottom: 2px solid #fbbf24; 
            padding: 8px 12px; flex-shrink: 0;
        }

        .niza-main { display: flex; flex: 1; overflow: hidden; background: #000; padding-bottom: 110px; }
        .col-izq { width: 55%; overflow-y: auto; padding: 8px; border-right: 1px solid #27272a; }
        .col-der { width: 45%; overflow-y: auto; padding: 8px; background: #09090b; }

        .niza-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #111; border-top: 1px solid #3f3f46; z-index: 50;
        }

        .contenedor-botones {
            display: grid; grid-template-columns: 0.8fr 0.8fr 0.8fr 0.8fr 2.2fr;
            gap: 6px; padding: 10px;
        }

        .btn-tool {
            background: #27272a; border-radius: 10px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 52px; border: 1px solid #52525b;
        }
        .btn-tool b { font-size: 8px; color: #fff; text-transform: uppercase; margin-top: 2px; }

        .btn-pay {
            background: #15803d; border-radius: 10px; color: white;
            display: flex; align-items: center; justify-content: center; gap: 5px; height: 52px;
            border-bottom: 3px solid #14532d;
        }

        .linea-final {
            height: 24px; background: #fbbf24; display: flex; align-items: center;
            justify-content: center; font-size: 9px; font-weight: 900; color: black;
        }

        .item-cart { display: flex; justify-content: space-between; align-items: center; background: #18181b; padding: 8px; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid #f97316; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header class="niza-header">
        <div class="flex justify-between items-center mb-2">
            <h1 class="font-black italic text-xs text-yellow-400">NIZA V43</h1>
            <div class="flex gap-1.5">
                <button onclick="cierreDia()" class="bg-red-600 px-2 py-1 rounded text-[9px] font-black tap border border-white/20">CIERRE</button>
                <button onclick="verHistorial()" class="bg-zinc-800 px-2.5 py-1 rounded text-[10px] tap">🕒</button>
                <button onclick="accesoAdmin()" class="bg-zinc-800 px-2.5 py-1 rounded text-[10px] tap">⚙️</button>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center">
            <div class="bg-black/40 rounded py-1 border border-white/5">
                <span class="block text-[7px] uppercase font-bold text-zinc-400">Ventas</span>
                <span class="text-green-400 text-[11px] font-black" id="v-ventas">$ 0</span>
            </div>
            <div class="bg-black/40 rounded py-1 border border-white/5">
                <span class="block text-[7px] uppercase font-bold text-zinc-400">Gastos</span>
                <span class="text-red-400 text-[11px] font-black" id="v-gastos">$ 0</span>
            </div>
            <div class="bg-orange-600 rounded py-1 shadow-inner">
                <span class="block text-[7px] uppercase font-bold text-orange-100">Total</span>
                <span class="text-white text-[11px] font-black" id="v-total">$ 0</span>
            </div>
        </div>
    </header>

    <div class="niza-main">
        <div class="col-izq">
            <input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 Buscar..." class="w-full bg-zinc-900 text-white p-2 rounded-lg mb-3 border border-zinc-800 text-sm outline-none">
            <div id="menu" class="grid grid-cols-2 gap-2"></div>
        </div>
        <div class="col-der">
            <div id="lista-carrito"></div>
        </div>
    </div>

    <footer class="niza-footer">
        <div class="contenedor-botones">
            <button onclick="vaciarCarrito()" class="btn-tool text-red-500 tap">
                <span>🗑️</span> <b>Borrar</b>
            </button>
            <button onclick="addDomi()" class="btn-tool text-blue-400 tap">
                <span>🛵</span> <b>Domi</b>
            </button>
            <button onclick="aplicarDescuento()" class="btn-tool text-orange-400 tap">
                <span>🏷️</span> <b>Desc</b>
            </button>
            <button onclick="abrirGasto()" class="btn-tool text-red-400 tap">
                <span>💸</span> <b>Gasto</b>
            </button>
            <button onclick="irAPagar()" class="btn-pay tap">
                <div class="text-right">
                    <p class="text-[8px] font-black uppercase opacity-80">Pagar</p>
                    <p id="t-ped" class="text-lg font-black leading-none">$ 0</p>
                </div>
                <span class="text-xl">💰</span>
            </button>
        </div>
        <div class="linea-final">NIZA ELITE V43 • SEGURIDAD TOTAL</div>
    </footer>

    <div id="m-pago" class="modal">
        <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-xs border border-green-600 text-center shadow-2xl">
            <h2 class="text-white font-black mb-6 uppercase italic">Método de Pago</h2>
            <button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-5 rounded-2xl text-xl font-black mb-4 tap text-white">💵 EFECTIVO</button>
            <button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-5 rounded-2xl text-xl font-black tap text-white">📱 TRANSF.</button>
            <button onclick="cerrarModales()" class="mt-6 text-zinc-500 font-bold uppercase text-xs">← Volver</button>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-yellow-500 text-center"><h2 class="text-white font-black mb-4 uppercase text-sm italic text-yellow-500">¿Quién atiende?</h2><div class="grid grid-cols-2 gap-2" id="user-btns"></div></div></div>
    <div id="m-opciones" class="modal"><div class="bg-zinc-900 p-5 rounded-2xl w-72 border border-orange-500 shadow-2xl"><h2 id="opt-t" class="text-yellow-400 font-black mb-4 uppercase text-center text-xs">Opciones</h2><div id="opt-c" class="flex flex-col gap-2"></div><button onclick="cerrarModales()" class="mt-4 text-zinc-600 text-[10px] w-full text-center uppercase font-bold">Volver</button></div></div>

    <script>
        const CLAVE = "1234";
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let store = null, pedTot = 0, descAct = 0, carrito = [], uAct = "---", tempP = null;

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        function getColTime() {
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('en-CA', { timeZone: 'America/Bogota' });
            const hora = ahora.toLocaleTimeString('es-CO', { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', hour12: false });
            return { fecha, hora };
        }

        const users = ['Nelson', 'Jenny', 'Juan', 'Elizabeth', 'Valeria', 'Betty'];
        const uDiv = document.getElementById('user-btns');
        users.forEach(u => { 
            const btn = document.createElement('button');
            btn.className = "bg-zinc-800 py-3 rounded-lg font-bold tap text-[10px] text-white uppercase border border-white/5";
            btn.innerText = u;
            btn.onclick = () => setU(u);
            uDiv.appendChild(btn);
        });

        function setU(n) {
            uAct = n; 
            document.getElementById('m-user').style.display = 'none';
            db.ref('/niza_v31_rep').on('value', (snap) => {
                store = snap.val();
                if(store) draw();
            });
        }

        window.draw = function(filtro = "") {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                if(filtro && !p.nombre.toLowerCase().includes(filtro)) return;
                m.innerHTML += `<div onclick="abrirOpt(${p.id})" class="bg-zinc-900 p-2 rounded-xl tap text-center border border-white/5">
                    <div class="text-xl mb-1">${p.icon}</div>
                    <div class="text-[9px] font-black uppercase text-zinc-400 h-4 flex items-center justify-center leading-none">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-[10px] mt-1">$ ${f(p.precio)}</div>
                </div>`;
            });
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        };

        window.addCarrito = function(id, n, v, si) { carrito.push({ id, n, v, si }); actualizarTotal(); };
        function actualizarTotal() {
            let b = carrito.reduce((a, x) => a + x.v, 0);
            pedTot = b - descAct;
            document.getElementById('t-ped').innerText = "$ " + f(pedTot);
