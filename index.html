<!DOCTYPE html>

        body { background-color: #000; color: white; user-select: none; font-family: sans-serif; overflow-x: hidden; }

<body>

    <header class="bg-red-800 p-2 sticky top-0 shadow-2xl z-50 border-b-2 border-yellow-500">

            <div class="bg-orange-600 p-1 rounded-lg text-white shadow-lg">En Caja<br><span id="v-total" class="text-[9px] font-mono font-black">$ 0</span></div>

        </div>

            <button onclick="confirmarMetodoPago()" class="bg-green-600 text-white w-20 h-14 rounded-2xl text-4xl tap flex items-center justify-center font-black italic shadow-xl border-b-4 border-green-900">💰</button>
        </div>
    </div>

            <div class="grid grid-cols-2 gap-3">

                <button onclick="setUsuario('Jenny')" class="bg-zinc-800 py-4 rounded-xl font-black tap uppercase text-white shadow-md border-b-2 border-zinc-700">Jenny</button>
                <button onclick="setUsuario('Juan')" class="bg-zinc-800 py-4 rounded-xl font-black tap uppercase text-white shadow-md border-b-2 border-zinc-700">Juan</button>
                <button onclick="setUsuario('Elizabeth')" class="bg-zinc-800 py-4 rounded-xl font-black tap uppercase text-white shadow-md border-b-2 border-zinc-700">Elizabeth</button>
                <button onclick="setUsuario('Valeria')" class="bg-zinc-800 py-4 rounded-xl font-black tap uppercase text-white shadow-md border-b-2 border-zinc-700">Valeria</button>
                <button onclick="setUsuario('Betty')" class="bg-zinc-800 py-4 rounded-xl font-black tap uppercase text-white shadow-md border-b-2 border-zinc-700">Betty</button>
            </div>
        </div>
    </div>

    <div id="m-pago" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-[35px] w-full max-w-sm border-2 border-green-500 text-center">
            <h2 class="text-white font-black mb-6 uppercase italic text-xl">Forma de Pago</h2>
            <button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-6 rounded-2xl text-xl font-black mb-3 tap uppercase text-white shadow-lg">💵 Efectivo</button>
            <button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-6 rounded-2xl text-xl font-black tap uppercase text-white shadow-lg">📱 Transferencia</button>
            <button onclick="document.getElementById('m-pago').style.display='none'" class="mt-4 text-zinc-500 text-xs uppercase">Cancelar</button>
        </div>
    </div>

    <div id="m-historial" class="modal px-4"><div class="bg-zinc-900 p-5 rounded-[30px] w-full max-w-md max-h-[80vh] flex flex-col border border-zinc-700">

        <div id="h-list" class="overflow-y-auto flex-1 space-y-2 mb-4 text-[10px]"></div>
        <button onclick="document.getElementById('m-historial').style.display='none'" class="bg-zinc-800 py-3 rounded-xl font-black uppercase text-white">Cerrar</button>
    </div></div>
