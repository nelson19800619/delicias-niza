<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIZA POS - Opciones</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-black text-white pb-44 font-sans">

    <header class="bg-red-900 p-4 sticky top-0 z-50 border-b border-orange-500 shadow-xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black italic text-yellow-400 uppercase tracking-tighter">NIZA POS</h1>
            <div class="flex gap-2 text-[10px]">
                <button onclick="document.getElementById('m-admin').style.display='flex'; actAdmin();" class="bg-yellow-500 text-black px-3 py-1 rounded-lg font-bold tap uppercase">Admin</button>
                <button onclick="verRepo()" class="bg-white/10 px-3 py-1 rounded-lg font-bold tap uppercase">Cierre</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-[9px] text-center font-mono">
            <div class="bg-black/30 p-1 rounded">Base<br><span id="v-base" class="text-blue-300 font-bold">$ 0</span></div>
            <div class="bg-black/30 p-1 rounded">Ventas<br><span id="v-ventas" class="text-green-400 font-bold">$ 0</span></div>
            <div class="bg-black/30 p-1 rounded">Gastos<br><span id="v-gastos" class="text-red-400 font-bold">$ 0</span></div>
            <div class="bg-orange-600/30 p-1 rounded border border-orange-500 font-black text-yellow-300">$ <span id="v-total">0</span></div>
        </div>
    </header>

    <main id="menu" class="p-4 grid grid-cols-2 gap-3"></main>

    <div id="m-opciones" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-3xl w-full text-center border border-zinc-700 shadow-2xl">
            <h2 id="opt-titulo" class="text-yellow-500 font-black mb-6 uppercase text-xl italic">¿Con qué va?</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="sumarConOpcion('papa')" class="bg-slate-800 py-6 rounded-2xl text-xl font-black tap border-2 border-slate-700">🥔 CON PAPA</button>
                <button onclick="sumarConOpcion('patacon')" class="bg-orange-900/40 py-6 rounded-2xl text-xl font-black tap border-2 border-orange-700 text-orange-400">🍌 CON PATACÓN</button>
            </div>
            <button onclick="cerrarOpciones()" class="mt-6 text-zinc-500 text-[10px] font-bold uppercase">Cancelar</button>
        </div>
    </div>

    <div id="m-domi" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-3xl w-full text-center border border-zinc-700 shadow-2xl">
            <h2 class="text-blue-400 font-black mb-4 uppercase">Valor Domicilio</h2>
            <input type="number" id="domi-v" placeholder="$ 0" class="w-full bg-zinc-800 p-4 rounded-xl mb-6 text-white text-center text-4xl font-mono outline-none border-2 border-blue-900">
            <button onclick="addDomi()" class="w-full bg-blue-600 py-5 rounded-xl font-black tap mb-2 uppercase">Sumar 🛵</button>
            <button onclick="document.getElementById('m-domi').style.display='none'" class="text-zinc-500 text-xs py-2 font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <div id="m-gasto" class="modal px-6">
        <div class="bg-zinc-900 p-6 rounded-3xl w-full text-center border border-zinc-700 shadow-2xl">
            <h2 class="text-red-500 font-black mb-4 uppercase">Registrar Gasto</h2>
            <input type="number" id="g-v" placeholder="$ 0" class="w-full bg-zinc-800 p-4 rounded-xl mb-2 text-white text-center text-3xl font-mono outline-none">
            <input type="text" id="g-d" placeholder="Descripción" class="w-full bg-zinc-800 p-4 rounded-xl mb-6 text-white text-center uppercase font-bold outline-none">
            <button onclick="saveGasto()" class="w-full bg-red-600 py-5 rounded-xl font-black tap mb-2 uppercase">Guardar 💸</button>
            <button onclick="document.getElementById('m-gasto').style.display='none'" class="text-zinc-500 text-xs py-2 font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <div id="m-admin" class="modal px-4">
        <div class="bg-zinc-900 p-6 rounded-[30px] w-full max-h-[85vh] flex flex-col border border-zinc-700 shadow-2xl">
            <h2 class="text-yellow-500 font-black text-center mb-4 uppercase">Inventario</h2>
            <input type="number" id="a-base" class="w-full bg-zinc-800 p-3 rounded-xl mb-4 text-center text-xl font-mono text-white outline-none">
            <div id="a-items" class="overflow-y-auto flex-1 mb-4 space-y-2 pr-1"></div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('m-admin').style.display='none'" class="flex-1 bg-zinc-800 py-4 rounded-xl text-[10px] font-black uppercase">Salir</button>
                <button onclick="saveAdmin()" class="flex-1 bg-green-600 py-4 rounded-xl text-[10px] font-black uppercase shadow-lg">Guardar ✅</button>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white p-6 flex justify-between items-center z-50 rounded-t-[45px] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div>
            <span class="text-zinc-400 text-[9px] block uppercase font-black italic mb-1">Total Pedido</span>
            <span id="t-ped" class="text-5xl font-black text-black font-mono italic leading-none tracking-tighter">$ 0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('m-domi').style.display='flex'" class="bg-blue-50 text-blue-600 w-14 h-16 rounded-2xl text-2xl tap flex items-center justify-center border border-blue-100">🛵</button>
            <button onclick="document.getElementById('m-gasto').style.display='flex'" class="bg-red-50 text-red-600 w-14 h-16 rounded-2xl text-2xl tap flex items-center justify-center border border-red-100">💸</button>
            <button onclick="doCobro()" class="bg-green-600 text-white w-24 h-20 rounded-3xl text-5xl tap shadow-xl flex items-center justify-center font-black italic">💰</button>
        </div>
    </footer>

    <script>
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null; let pedido = 0; let tempProd = null;

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);

        db.ref('/').on('value', (s) => {
            store = s.val();
            if(!store) {
                const init = [
                    { id: 1, nombre: "Empanadas", precio: 4000, cant: 50, icon: "🥟", opt: false },
                    { id: 2, nombre: "Rellena", precio: 7000, cant: 20, icon: "🍖", opt: true },
                    { id: 3, nombre: "Pinchos", precio: 8000, cant: 20, icon: "🍢", opt: true },
                    { id: 4, nombre: "Fresas Crema", precio: 14000, cant: 10, icon: "🍓", opt: false },
                    { id: 5, nombre: "Limonada", precio: 1000, cant: 20, icon: "🥤", opt: false }
                ];
                db.ref('/').set({ base: 0, ventas: 0, gastos: 0, stock: init, h: [] });
            } else { draw(); }
        });

        function draw() {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                m.innerHTML += `<div onclick="intentarSumar(${p.id})" class="bg-zinc-900 p-4 rounded-3xl border border-white/5 shadow-2xl tap">
                    <div class="text-4xl mb-1">${p.icon}</div>
                    <div class="text-[9px] font-black uppercase text-white/60 mb-1 leading-none h-4">${p.nombre}</div>
                    <div class="text-orange-400 font-black text-xs font-mono">$ ${f(p.precio)}</div>
                    <div class="text-[7px] text-green-500 uppercase mt-1 font-bold">Disp: ${p.cant}</div>
                </div>`;
            });
            document.getElementById('v-base').innerText = "$ " + f(store.base);
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function intentarSumar(id) {
            let p = store.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("¡SIN STOCK!");
            
            if(p.opt) {
                tempProd = p;
                document.getElementById('opt-titulo').innerText = "¿" + p.nombre + " con qué?";
                document.getElementById('m-opciones').style.display = 'flex';
            } else {
                sumarDirecto(p, p.precio);
            }
        }

        function sumarConOpcion(tipo) {
            let precioFinal = tempProd.precio;
            if(tipo === 'patacon') {
                precioFinal += 1000; // Si es patacón, suma 1.000 más
            }
            sumarDirecto(tempProd, precioFinal);
            cerrarOpciones();
        }

        function sumarDirecto(p, precio) {
            pedido += precio;
            p.cant--;
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
        }

        function cerrarOpciones() {
            document.getElementById('m-opciones').style.display = 'none';
            tempProd = null;
        }

        function addDomi() {
            const val = parseInt(document.getElementById('domi-v').value) || 0;
            pedido += val;
            document.getElementById('t-ped').innerText = "$ " + f(pedido);
            document.getElementById('m-domi').style.display='none';
            document.getElementById('domi-v').value = '';
        }

        function doCobro() {
            if(pedido === 0) return alert("Pedido vacío");
            db.ref('/').update({ ventas: store.ventas + pedido, stock: store.stock }).then(() => {
                pedido = 0; document.getElementById('t-ped').innerText = "$ 0";
                alert("COBRADO ✅");
            });
        }

        function saveGasto() {
            const val = parseInt(document.getElementById('g-v').value);
            const des = document.getElementById('g-d').value || "Gasto";
            if(!val) return;
            const hist = store.h || []; 
            hist.push({ v: val, d: des, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            db.ref('/').update({ gastos: (store.gastos || 0) + val, h: hist }).then(() => {
                document.getElementById('m-gasto').style.display='none';
                document.getElementById('g-v').value=''; document.getElementById('g-d').value='';
                alert("GASTO GUARDADO 💸");
