<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Niza POS - Gastos Detallados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .tap-active:active { transform: scale(0.95); opacity: 0.7; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans pb-40">

    <header class="bg-gradient-to-b from-red-800 to-red-900 p-6 rounded-b-[45px] sticky top-0 z-40 shadow-2xl border-b-2 border-orange-500/30">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic text-yellow-400 uppercase tracking-tighter">DELICIAS NIZA</h1>
            <div class="flex gap-2">
                <button onclick="abrirAdmin()" class="bg-yellow-500 text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase tap-active shadow-lg">ADMIN ⚙️</button>
                <button onclick="verReporte()" class="bg-black/40 px-3 py-2 rounded-xl text-[10px] font-bold uppercase tap-active">CIERRE 📊</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-2 text-center font-mono">
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Base</span><span id="txt-base" class="text-[10px] text-blue-300 font-bold">$ 0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Ventas</span><span id="txt-ventas" class="text-[10px] text-green-400 font-bold">$ 0</span></div>
            <div class="bg-black/20 p-2 rounded-xl"><span class="text-[7px] block opacity-50 uppercase">Gastos</span><span id="txt-gastos" class="text-[10px] text-red-400 font-bold">$ 0</span></div>
            <div class="bg-orange-500/20 p-2 rounded-xl border border-orange-500/30"><span class="text-[7px] block opacity-50 text-white font-bold uppercase">Caja</span><span id="txt-total" class="text-[10px] font-black text-yellow-300">$ 0</span></div>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto">
        <div onclick="toggleDomi()" id="btn-domi-ui" class="flex items-center justify-between bg-slate-900 p-5 rounded-[30px] mb-6 border-2 border-slate-800 tap-active">
            <div class="flex items-center gap-4">
                <div id="icon-domi" class="text-3xl grayscale opacity-40">🛵</div>
                <p class="font-black text-xs uppercase italic tracking-widest text-slate-300">DOMICILIO (+$ 2.000)</p>
            </div>
            <div id="check-ui" class="w-8 h-8 rounded-full border-4 border-slate-700"></div>
        </div>
        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>
    </main>

    <div id="modal-admin" class="modal px-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[35px] p-6 max-h-[85vh] flex flex-col">
            <h2 class="text-lg font-black mb-4 text-center text-yellow-500 uppercase italic">CONFIGURACIÓN</h2>
            <div class="bg-blue-900/10 p-4 rounded-2xl border border-blue-500/30 mb-4">
                <p class="text-[9px] font-black text-blue-300 uppercase mb-2 text-center tracking-widest">Base de Dinero Hoy ($)</p>
                <input type="number" id="adm-base" class="w-full bg-slate-800 p-3 rounded-xl text-white font-mono text-xl text-center outline-none border border-slate-700">
            </div>
            <div id="admin-items" class="overflow-y-auto space-y-3 pr-1 flex-1"></div>
            <div class="mt-6 flex gap-2">
                <button onclick="cerrarTodo()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-[11px] uppercase text-slate-400">SALIR</button>
                <button onclick="guardarAdmin()" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg">GUARDAR ✅</button>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal px-6">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-[35px] p-8 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-red-500 uppercase italic text-center">REGISTRAR GASTO</h2>
            
            <p class="text-[10px] font-black opacity-50 uppercase mb-2 tracking-widest">¿Cuánto dinero salió? ($)</p>
            <input type="number" id="m-gasto-val" placeholder="0" class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-white text-3xl font-mono text-center outline-none border border-red-900">
            
            <p class="text-[10px] font-black opacity-50 uppercase mb-2 tracking-widest">¿Para qué fue el gasto?</p>
            <input type="text" id="m-gasto-desc" placeholder="Ej: Aceite, Gas, Papas..." class="w-full bg-slate-800 p-4 rounded-xl mb-8 text-white text-sm text-center outline-none border border-slate-700 uppercase font-bold">

            <button onclick="guardarGasto()" class="w-full bg-red-600 py-5 rounded-2xl font-black uppercase text-sm shadow-xl tap-active mb-3">GUARDAR GASTO 💸</button>
            <button onclick="cerrarTodo()" class="w-full text-slate-500 text-[10px] font-black uppercase tracking-widest tap-active">CANCELAR</button>
        </div>
    </div>

    <footer class="fixed bottom-6 left-6 right-6 bg-white rounded-[40px] p-6 flex justify-between items-center shadow-2xl z-50 border-t-4 border-green-500">
        <div>
            <span class="text-[8px] font-black text-slate-400 uppercase mb-1 block">TOTAL PEDIDO</span>
            <span id="total-ticket" class="text-4xl font-black text-slate-900 italic font-mono leading-none">$ 0</span>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirGasto()" class="bg-red-50 text-red-600 h-16 w-14 rounded-2xl flex items-center justify-center text-2xl tap-active border border-red-100 shadow-inner">💸</button>
            <button onclick="finalizarVenta()" class="bg-green-600 text-white h-16 w-24 rounded-3xl flex items-center justify-center text-4xl shadow-xl tap-active">💰</button>
        </div>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
            messagingSenderId: "274297319879",
            appId: "1:274297319879:web:3c72d7034baf683e85a9e2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let appData = null; let tempTotal = 0; let esDomi = false;

        // Función de Formato de Pesos
        const f = (v) => "$ " + new Intl.NumberFormat('de-DE').format(v || 0);

        database.ref('/').on('value', (snap) => {
            const data = snap.val();
            if (!data || !data.stock) initDB(); 
            else { appData = data; render(); }
        });

        function initDB() {
            const m = [
                { id: 1, nombre: "Empanada Pollo", precio: 4000, cant: 10, icon: "🥟" },
                { id: 2, nombre: "Empanada Queso", precio: 4000, cant: 10, icon: "🧀" },
                { id: 3, nombre: "Empanada Mixta", precio: 4000, cant: 10, icon: "🌽" },
                { id: 4, nombre: "Empanada Hawayana", precio: 4000, cant: 10, icon: "🍍" },
                { id: 5, nombre: "Rellena/Papa", precio: 7000, cant: 10, icon: "🍖" },
                { id: 6, nombre: "Pinchos", precio: 8000, cant: 10, icon: "🍢" },
                { id: 7, nombre: "Fresas Crema", precio: 14000, cant: 10, icon: "🍓" },
                { id: 8, nombre: "Limonada", precio: 1000, cant: 10, icon: "🥤" }
            ];
            database.ref('/').set({ base: 0, ventas: 0, gastos: 0, stock: m, historialGastos: [] });
        }

        function render() {
            const g = document.getElementById('menu-grid'); g.innerHTML = '';
            appData.stock.forEach(p => {
                g.innerHTML += `
                    <div onclick="vender(${p.id})" class="bg-slate-900 border border-white/5 p-4 rounded-[25px] tap-active shadow-lg">
                        <div class="text-3xl mb-1">${p.icon}</div>
                        <h3 class="text-[10px] font-black uppercase opacity-60 leading-none mb-1">${p.nombre}</h3>
                        <p class="text-orange-400 font-mono font-bold text-xs">${f(p.precio)}</p>
                        <span class="text-[8px] font-bold opacity-30">DISP: ${p.cant}</span>
                    </div>
                `;
            });
            document.getElementById('txt-base').innerText = f(appData.base);
            document.getElementById('txt-ventas').innerText = f(appData.ventas);
            document.getElementById('txt-gastos').innerText = f(appData.gastos);
            document.getElementById('txt-total').innerText = f(appData.base + appData.ventas - appData.gastos);
        }

        function abrirAdmin() {
            const cont = document.getElementById('admin-items');
            document.getElementById('adm-base').value = appData.base;
            cont.innerHTML = '';
            appData.stock.forEach((p, i) => {
                cont.innerHTML += `
                    <div class="bg-slate-800/60 p-4 rounded-2xl border border-white/5 mb-2">
                        <input type="text" id="adm-nom-${i}" value="${p.nombre}" class="bg-transparent text-yellow-400 font-black uppercase text-[10px] w-full mb-2 outline-none">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="adm-pre-${i}" value="${p.precio}" class="bg-slate-950 p-2 rounded-lg text-xs font-mono text-orange-400 text-center">
                            <input type="number" id="adm-can-${i}" value="${p.cant}" class="bg-slate-950 p-2 rounded-lg text-xs font-mono text-green-400 text-center">
                        </div>
                    </div>
                `;
            });
            document.getElementById('modal-admin').style.display = 'flex';
        }

        function guardarAdmin() {
            const b = parseInt(document.getElementById('adm-base').value) || 0;
            const ns = appData.stock.map((p, i) => ({
                ...p, nombre: document.getElementById(`adm-nom-${i}`).value,
                precio: parseInt(document.getElementById(`adm-pre-${i}`).value) || 0,
                cant: parseInt(document.getElementById(`adm-can-${i}`).value) || 0
            }));
            database.ref('/').update({ base: b, stock: ns }).then(() => cerrarTodo());
        }

        function vender(id) {
            let p = appData.stock.find(x => x.id === id);
            if(p.cant <= 0) return alert("SIN STOCK");
            tempTotal += p.precio; p.cant--;
            document.getElementById('total-ticket').innerText = f(tempTotal);
        }

        function finalizarVenta() {
            if(tempTotal === 0) return;
            let v = tempTotal + (esDomi ? 2000 : 0);
            database.ref('/').update({ ventas: appData.ventas + v, stock: appData.stock })
                .then(() => { tempTotal = 0; if(esDomi) toggleDomi(); document.getElementById('total-ticket').innerText = f(0); });
        }

        function toggleDomi() {
            esDomi = !esDomi;
            const ui = document.getElementById('btn-domi-ui');
            const ch = document.getElementById('check-ui');
            if(esDomi) { ui.classList.add('bg-orange-500/10', 'border-orange-400'); ch.classList.add('bg-orange-500'); }
            else { ui.classList.remove('bg-orange-500/10', 'border-orange-400'); ch.classList.remove('bg-orange-500'); }
        }

        function abrirGasto() { document.getElementById('modal-gasto').style.display = 'flex'; }
        
        function guardarGasto() {
            const val = parseInt(document.getElementById('m-gasto-val').value);
            const desc = document.getElementById('m-gasto-desc').value || "Gasto sin nombre";
            
            if(!val || val <= 0) return alert("POR FAVOR INGRESA EL VALOR");

            const nuevoGasto = { valor: val, motivo: desc, hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            const listaGastos = appData.historialGastos || [];
            listaGastos.push(nuevoGasto);

            database.ref('/').update({ 
                gastos: (appData.gastos || 0) + val,
                historialGastos: listaGastos
            }).then(() => {
                cerrarTodo();
                document.getElementById('m-gasto-val').value = '';
                document.getElementById('m-gasto-desc').value = '';
                alert("GASTO REGISTRADO ✅");
            });
        }

        function verReporte() {
            const t = appData.base + appData.ventas - appData.gastos;
            let listaG = "DETALLE DE GASTOS:\n";
            if(appData.historialGastos) {
                appData.historialGastos.forEach(g => {
                    listaG += `- [${g.hora}] ${g.motivo}: ${f(g.valor)}\n`;
                });
            } else { listaG += "Sin gastos hoy."; }

            alert(`📊 REPORTES\n\nBase: ${f(appData.base)}\nVentas: ${f(appData.ventas)}\nGastos: ${f(appData.gastos)}\n-------------------\nTotal Caja: ${f(t)}\n\n${listaG}`);
            
            if(confirm("¿DESEAS REINICIAR LAS VENTAS Y GASTOS HOY?")) {
                database.ref('/').update({ ventas: 0, gastos: 0, historialGastos: [] });
            }
        }

        function cerrarTodo() {
            document.getElementById('modal-admin').style.display = 'none';
            document.getElementById('modal-gasto').style.display = 'none';
        }
    </script>
</body>
</html>
