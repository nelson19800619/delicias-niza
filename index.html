<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NIZA V35 FULL BAR</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tap:active { transform: scale(0.95); opacity: 0.8; }
        body { 
            background-color: #000; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .cabecera { height: 75px; flex-shrink: 0; background: #991b1b; border-bottom: 2px solid #eab308; padding: 5px 10px; }
        
        /* CUERPO DIVIDIDO EN DOS */
        .cuerpo { display: flex; flex: 1; overflow: hidden; }
        .izquierda { width: 55%; overflow-y: auto; padding: 6px; background: #050505; border-right: 1px solid #222; }
        .derecha { width: 45%; overflow-y: auto; padding: 6px; background: #0a0a0a; }

        .item-carrito { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid #f97316; }

        /* LA FILA ÚNICA QUE UNE TODO ABAJO */
        .barra-inferior { 
            height: 90px;
            flex-shrink: 0; 
            background: #111; 
            border-top: 2px solid #eab308; 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2.5fr; /* 3 botones pequeños y uno grande de cobrar */
            gap: 6px;
            padding: 8px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        .btn-accion {
            background: #27272a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid #3f3f46;
        }
        .btn-accion span { font-size: 8px; font-weight: bold; color: #a1a1aa; margin-top: 2px; text-transform: uppercase; }

        .btn-cobrar {
            background: #16a34a;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 15px;
            border-bottom: 4px solid #14532d;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header class="cabecera">
        <div class="flex justify-between items-center mb-1">
            <h1 class="font-black italic text-[12px] text-yellow-400">NIZA V35 ELITE</h1>
            <div class="flex gap-2">
                <button onclick="verConsultas()" class="bg-blue-600 px-3 py-1 rounded text-xs tap">📊</button>
                <button onclick="verHistorial()" class="bg-zinc-800 px-3 py-1 rounded text-xs tap">🕒</button>
                <button onclick="accesoAdmin()" class="bg-zinc-800 px-3 py-1 rounded text-xs tap">⚙️</button>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-1 text-center">
            <div class="bg-black/40 rounded py-0.5 font-bold text-green-400 text-[11px]" id="v-ventas">$ 0</div>
            <div class="bg-black/40 rounded py-0.5 font-bold text-red-400 text-[11px]" id="v-gastos">$ 0</div>
            <div class="bg-orange-600 rounded py-0.5 font-bold text-white text-[11px]" id="v-total">$ 0</div>
            <button onclick="verRepoDetallado()" class="bg-yellow-500 text-black rounded font-black text-[9px] uppercase tap">Cierre</button>
        </div>
    </header>

    <div class="cuerpo">
        <div class="izquierda">
            <input type="text" id="buscador" onkeyup="buscar()" placeholder="🔍 Buscar..." class="w-full bg-zinc-900 text-white p-2 rounded-lg mb-2 border border-zinc-800 text-sm outline-none">
            <div id="menu" class="grid grid-cols-2 gap-2"></div>
        </div>
        
        <div class="derecha">
            <div id="lista-carrito"></div>
        </div>
    </div>

    <footer class="barra-inferior">
        <button onclick="addDomi()" class="btn-accion text-blue-400 tap">
            🛵 <span>Domi</span>
        </button>
        <button onclick="aplicarDescuento()" class="btn-accion text-orange-400 tap">
            🏷️ <span>Desc</span>
        </button>
        <button onclick="abrirGasto()" class="btn-accion text-red-400 tap">
            💸 <span>Gasto</span>
        </button>
        
        <button onclick="irAPagar()" class="btn-cobrar tap">
            <div class="text-left">
                <p class="text-[9px] uppercase font-bold opacity-80">Total Cobro</p>
                <p id="t-ped" class="text-xl font-black">$ 0</p>
            </div>
            <div class="text-2xl">💰</div>
        </button>
    </footer>

    <div id="m-pago" class="modal">
        <div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-green-500 text-center">
            <h2 class="text-white font-black mb-6 uppercase text-sm italic">¿Cómo pagan?</h2>
            <button onclick="doCobro('Efectivo')" class="w-full bg-green-700 py-5 rounded-2xl text-xl font-black mb-3 tap text-white shadow-lg">💵 EFECTIVO</button>
            <button onclick="doCobro('Transferencia')" class="w-full bg-blue-700 py-5 rounded-2xl text-xl font-black tap text-white shadow-lg">📱 TRANSF.</button>
            <button onclick="cerrarModales()" class="mt-6 text-zinc-500 text-xs uppercase font-bold">← Volver</button>
        </div>
    </div>

    <div id="m-user" class="modal" style="display: flex;"><div class="bg-zinc-900 p-6 rounded-3xl w-72 border border-yellow-500 text-center shadow-2xl"><h2 class="text-white font-black mb-4 uppercase text-sm italic text-yellow-500">¿Quién atiende?</h2><div class="grid grid-cols-2 gap-2" id="user-btns"></div></div></div>
    <div id="m-opciones" class="modal"><div class="bg-zinc-900 p-5 rounded-2xl w-72 border border-orange-500 shadow-2xl"><h2 id="opt-t" class="text-yellow-400 font-black mb-4 uppercase text-center text-xs">Opciones</h2><div id="opt-c" class="flex flex-col gap-2"></div><button onclick="cerrarModales()" class="mt-4 text-zinc-600 text-[10px] w-full text-center uppercase font-bold">Volver</button></div></div>

    <script>
        const CLAVE = "1234";
        const cfg = {
            apiKey: "AIzaSyBZ93gaPrEkHY5gsNgkBxLEH_GHko_ijFs",
            authDomain: "delicias--niza.firebaseapp.com",
            databaseURL: "https://delicias--niza-default-rtdb.firebaseio.com",
            projectId: "delicias--niza",
            storageBucket: "delicias--niza.firebasestorage.app",
        };
        firebase.initializeApp(cfg);
        const db = firebase.database();
        let store = null, pedTot = 0, descAct = 0, carrito = [], uAct = "---", tempP = null;

        const f = (n) => new Intl.NumberFormat('de-DE').format(n || 0);
        function getColTime() {
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('en-CA', { timeZone: 'America/Bogota' });
            const hora = ahora.toLocaleTimeString('es-CO', { timeZone: 'America/Bogota', hour: '2-digit', minute: '2-digit', hour12: false });
            return { fecha, hora };
        }

        const users = ['Nelson', 'Jenny', 'Juan', 'Elizabeth', 'Valeria', 'Betty'];
        const uDiv = document.getElementById('user-btns');
        users.forEach(u => { uDiv.innerHTML += `<button onclick="setU('${u}')" class="bg-zinc-800 py-3 rounded-lg font-bold tap text-[10px] text-white uppercase border border-white/5">${u}</button>`; });

        function setU(n) {
            uAct = n; document.getElementById('m-user').style.display = 'none';
            db.ref('/niza_v31_rep').on('value', (snap) => {
                store = snap.val();
                if(store) draw();
            });
        }

        function draw(filtro = "") {
            const m = document.getElementById('menu'); m.innerHTML = '';
            store.stock.forEach(p => {
                if(filtro && !p.nombre.toLowerCase().includes(filtro)) return;
                m.innerHTML += `<div onclick="abrirOpt(${p.id})" class="bg-zinc-900 p-2 rounded-xl tap text-center border border-white/5">
                    <div class="text-2xl mb-1">${p.icon}</div>
                    <div class="text-[9px] font-black uppercase text-zinc-400 h-5 flex items-center justify-center leading-none">${p.nombre}</div>
                    <div class="text-orange-500 font-bold text-[11px] mt-1">$ ${f(p.precio)}</div>
                </div>`;
            });
            document.getElementById('v-ventas').innerText = "$ " + f(store.ventas);
            document.getElementById('v-gastos').innerText = "$ " + f(store.gastos);
            document.getElementById('v-total').innerText = "$ " + f((store.base || 0) + (store.ventas || 0) - (store.gastos || 0));
        }

        function addCarrito(id, n, v, si) { carrito.push({ id, n, v, si }); actualizarTotal(); }
        function actualizarTotal() {
            let b = carrito.reduce((a, x) => a + x.v, 0);
            pedTot = b - descAct;
            document.getElementById('t-ped').innerText = "$ " + f(pedTot);
            renderCarrito();
        }

        function renderCarrito() { 
            const c = document.getElementById('lista-carrito'); c.innerHTML = ''; 
            carrito.forEach((item, i) => { 
                c.innerHTML += `<div class="item-carrito"><div><p class="text-[10px] font-black uppercase text-white">${item.n}</p><p class="text-[9px] text-orange-400 font-bold">$ ${f(item.v)}</p></div><button onclick="quitarI(${i})" class="bg-red-900 text-white w-7 h-7 rounded-full tap text-xs">✕</button></div>`; 
            }); 
            c.scrollTop = c.scrollHeight;
        }

        function abrirOpt(id) { 
            let p = store.stock.find(x => x.id === id); 
            if(p.sub) { 
                tempP = p; document.getElementById('opt-t').innerText = p.nombre; const c = document.getElementById('opt-c'); c.innerHTML = ''; 
                p.sub.forEach((s, i) => { c.innerHTML += `<button onclick="sumarFinal(${i})" class="bg-zinc-800 py-4 rounded-xl text-xs font-black tap flex justify-between px-4"><span>${s.n}</span> <span class="text-green-500">${s.c}</span></button>`; }); 
                document.getElementById('m-opciones').style.display = 'flex'; 
            } else { addCarrito(p.id, p.nombre, p.precio, null); } 
        }

        function sumarFinal(i) { let sO = tempP.sub[i]; let ex = (sO.n === 'Con Patacón') ? 1000 : 0; addCarrito(tempP.id, `${tempP.nombre} (${sO.n})`, tempP.precio + ex, i); cerrarModales(); }
        function quitarI(i) { carrito.splice(i, 1); if(carrito.length===0) descAct=0; actualizarTotal(); }
        function irAPagar() { if(carrito.length > 0) document.getElementById('m-pago').style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function buscar() { draw(document.getElementById('buscador').value.toLowerCase()); }
        
        function doCobro(met) {
            const { fecha, hora } = getColTime();
            const h = store.h_v || [], gv = store.global_v || [];
            carrito.forEach(i => {
                const vO = { n: i.n, v: i.v, u: uAct, t: hora, fecha, m: met, pid: i.id, psi: i.si };
                h.push(vO); gv.push(vO);
                let p = store.stock.find(x => x.id === i.id);
                if(p) { if(i.si !== null) p.sub[i.si].c--; else p.cant--; }
            });
            if(descAct > 0) { const dO = { n: "DESC", v: -descAct, u: uAct, t: hora, fecha, m: met, esDesc: true }; h.push(dO); gv.push(dO); }
            db.ref('/niza_v31_rep').update({ ventas: store.ventas + pedTot, stock: store.stock, h_v: h, global_v: gv }).then(() => { cerrarModales(); carrito = []; descAct = 0; actualizarTotal(); });
        }
        
        function addDomi() { const v = parseInt(prompt("Valor domicilio $:")); if(v) { carrito.push({ id: 99, n: "Domicilio", v: v, si: null }); actualizarTotal(); } }
        function aplicarDescuento() { if(carrito.length > 0) { const v = parseInt(prompt("Valor de descuento $:")); if(v > 0) { descAct = v; actualizarTotal(); } } }
        function abrirGasto() { const v = parseInt(prompt("Valor $:")); const d = prompt("Concepto:"); if(v && d) { const { fecha, hora } = getColTime(); const h = store.h_g || [], gh = store.global_g || []; const obj = { v, d, u: uAct, t: hora, fecha, m: 'Efectivo' }; h.push(obj); gh.push(obj); db.ref('/niza_v31_rep').update({ gastos: (store.gastos || 0) + v, h_g: h, global_g: gh }); } }
    </script>
</body>
</html>
